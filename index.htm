        for (const key in obj) {

    function CountdownTimer({ closeDateString, closedText = 'Pendaftaran Ditutup' }) {
      const [timeLeft, setTimeLeft] = useState('');
      useEffect(() => {
        const calculateTime = () => {
          const difference = +new Date(closeDateString) - +new Date();
          if (difference <= 0) { setTimeLeft(closedText); return; }
          setTimeLeft(`${Math.floor(difference / (1000*60*60*24))}h ${Math.floor((difference / (1000*60*60)) % 24)}j ${Math.floor((difference / 1000 / 60) % 60)}m ${Math.floor((difference / 1000) % 60)}d lagi`);
        };
        calculateTime(); const interval = setInterval(calculateTime, 1000); return () => clearInterval(interval);
      }, [closeDateString, closedText]);
      const isClosed = timeLeft === closedText;
      return (
        <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold ${isClosed ? 'bg-red-50 text-red-700 border border-red-100' : 'bg-amber-50 text-amber-700 border border-amber-100'}`}>

    function KtaModal({ user, onClose, triggerToast, featureSettings }) {
      const qrContainerRef = React.useRef(null);

      useEffect(() => {
        if (qrContainerRef.current) {
          qrContainerRef.current.innerHTML = '';
          const qrData = JSON.stringify({
            id: user.id,
            n: user.name,
            r: user.regNo || '-',
            c: user.club || '-',
            role: user.role,
            s: user.sabuk || '-',
            a: 'TI MURA KTA',
            y: new Date().getFullYear()
          });
          new QRCode(qrContainerRef.current, {
            text: qrData,
            width: 110,
            height: 110,
            colorDark: '#7f1d1d',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
          });
        }
      }, [user.id]);

      const handleDownloadKTA = async () => {
        const ktaEl = document.getElementById('kta-visual-card');
        if (!ktaEl) { triggerToast("Gagal menemukan elemen KTA.", "error"); return; }
        try {
          triggerToast("Memproses KTA...");
          const canvas = await html2canvas(ktaEl, {
            scale: 6,
            useCORS: true,
            allowTaint: true,
            backgroundColor: null,
            logging: false,
            imageTimeout: 0
          });
          const { jsPDF } = window.jspdf;
          const cardW = 85.6;
          const cardH = 53.98;
          const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [cardW, cardH] });
          const imgData = canvas.toDataURL('image/png');
          doc.addImage(imgData, 'PNG', 0, 0, cardW, cardH);
          doc.save(`KTA_${user.name.replace(/\s+/g, '_')}.pdf`);
          triggerToast("KTA Berhasil Diunduh (PDF)!");

    function useDbCollection(colName, initialData, authUser) {
      const [data, setData] = useState([]);

      useEffect(() => {
        if (!db || !authUser) return;
        const colRef = collection(db, 'artifacts', appId, 'public', 'data', colName);
        const unsub = onSnapshot(colRef, (snap) => {
          if (snap.empty) {
            setData([]); 
          } else {
            const items = [];
            snap.forEach(d => items.push(d.data()));
            items.sort((a,b) => {
              const idA = a.id || 0;
              const idB = b.id || 0;
              if (typeof idA === 'number' && typeof idB === 'number') return idB - idA;
              return 0;
            }); 
            setData(items);
          }
        }, (err) => {
          console.error(`Gagal memuat Data Realtime untuk ${colName}:`, err);
        });
        return () => unsub();
      }, [colName, authUser]);

      const add = async (item) => {
        if (!db || !authUser) return;
        const docId = String(item.id || item.name || Date.now());
        const cleaned = cleanUndefined(item);
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, docId), cleaned);
      };

      const update = async (id, item) => {
        if (!db || !authUser) return;
        const cleaned = cleanUndefined(item);
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, String(id)), cleaned);
      };

      const remove = async (id) => {
        if (!db || !authUser) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, String(id)));
      };

      return [data, add, update, remove];
    }

    function MainAppContainer() {
      const [authUser, setAuthUser] = useState(null);
      const [isAppReady, setIsAppReady] = useState(false);
      const [authError, setAuthError] = useState('');

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Firebase Auth Error:", err);
            setAuthError(err.message);
          }
        };
        initAuth();

        const unsub = onAuthStateChanged(auth, async (user) => {
          if (user) {
             try {
                 const sysRef = doc(db, 'artifacts', appId, 'public', 'data', 'system_config', 'seeded');
                 const sysDoc = await getDoc(sysRef);
                 if (!sysDoc.exists()) {
                    const seedData = async (colName, dataArr) => {
                       const colRef = collection(db, 'artifacts', appId, 'public', 'data', colName);
                       for (let item of dataArr) {
                          const cleaned = cleanUndefined(item);
                          await setDoc(doc(colRef, String(item.id || item.name)), cleaned);
                       }
                    };
                    await seedData('users', initialUsers);
                    await seedData('clubs', initialClubs);
                    await seedData('uktEvents', initialUKTEvents);
                    await seedData('championships', initialChampionships);
                    await seedData('articles', initialArticles);
                    await seedData('athletePoints', initialPoints);
                    await seedData('historicalRaports', initialHistoricalRaports);
                    await seedData('attendances', initialAttendances);
                    await seedData('sppBills', initialSppBills);
                    await seedData('sppPayments', initialSppPayments);
                    await seedData('sanctions', initialSanctions);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'featureSettings', 'global'), initialFeatureSettings);
                    
                    await setDoc(sysRef, { isSeeded: true });
                 }
             } catch(err) {
                 console.error("Firestore Initialization Error:", err);
                 setAuthError("Gagal membaca Firestore Database. Pastikan Rules Firestore Anda mengizinkan read/write.");
             }
          }
          setAuthUser(user);
          setIsAppReady(true);
        });

        return () => unsub();
      }, []);

      if (authError) {
        return (
          <div className="app-wrapper w-full flex flex-col items-center justify-center bg-gray-100 p-4">
            <div className="bg-red-50 p-6 rounded-3xl border border-red-200 shadow-xl max-w-sm w-full text-center">
              <Icon name="AlertTriangle" className="w-12 h-12 text-red-600 mx-auto mb-3" />
              <h2 className="text-red-900 font-extrabold text-lg mb-2">Koneksi Database Gagal</h2>
              <p className="text-red-700 text-xs font-bold mb-4">{authError}</p>
              <div className="bg-white p-3 rounded-xl border border-red-100 text-left text-[10px] text-gray-700 font-medium">
                <strong>Solusi jika Anda host sendiri:</strong><br/>
                1. Buka Firebase Console &gt; Authentication.<br/>
                2. Aktifkan Sign-in method: <strong>Anonymous</strong>.<br/>
                3. Buka Firestore Database &gt; Rules, jadikan:
                <pre className="bg-gray-100 p-2 mt-1 rounded text-red-600 overflow-auto whitespace-pre-wrap">
match /artifacts/simtkdmura/public/data/&#123;document=**&#125; &#123;
  allow read, write: if request.auth != null;
&#125;</pre>
              </div>
            </div>
          </div>
        );
      }

      if (!isAppReady) {
        return (
          <div className="app-wrapper w-full flex flex-col items-center justify-center bg-gray-100">
            <Icon name="Database" className="w-10 h-10 text-red-700 animate-pulse mb-2" />
            <div className="text-red-700 font-extrabold text-sm">Menghubungkan ke Cloud Database Realtime...</div>
          </div>
        );
      }

      return <App authUser={authUser} />;
    }

    function App({ authUser }) {

      useEffect(() => {

      const updateFeatureSettingsOnDb = async (newSettings) => {

      const triggerToast = (message, type = 'success') => { toastToast({ show: true, message, type }); setTimeout(() => setToast(prev => ({ ...prev, show: false })), 4000); };
      const toastToast = (toastObj) => setToast(toastObj);

      if (!user) return <LoginScreen onLogin={setUser} users={users} appLogo={featureSettings?.branding?.logo} />;
      const activeUser = users.find(u => u.id === user.id) || user;

      const isFeatureAllowed = (role, featureKey) => {
        if (role === 'super_admin') return true; 
        return featureSettings[role]?.[featureKey] !== false;
      };

      const handleSyncAllToSheets = async () => {
        if (!GOOGLE_SHEETS_WEB_APP_URL) {
          triggerToast("Gagal: URL Google Apps Script belum diisi di dalam kode HTML!", "error");
          return;
        }
        triggerToast("Memulai sinkronisasi SELURUH DATA ke Google Sheets...", "success");
        
        const allDataPayload = {
          Akun_Pengguna: users,
          Data_Dojang: clubsData,
          Event_UKT: uktEvents,
          Event_Kejuaraan: championships,
          Berita_Pengumuman: articles,
          Pendaftar_UKT: uktRegistrations,
          Pendaftar_Kejuaraan: champRegistrations,
          Poin_Prestasi: athletePoints,
          Raport_UKT: historicalRaports,
          Absensi: attendances,
          Tagihan_SPP: sppBills,
          Pembayaran_SPP: sppPayments,
          Sanksi_Pelanggaran: sanctions
        };

        try {
          await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(allDataPayload)
          });
          triggerToast("Sinkronisasi Selesai! Semua data berhasil dikirim.", "success");
        } catch (err) {
          triggerToast("Gagal terhubung ke Google Sheets.", "error");
        }
      };

      // FUNGSI BACKUP DAN RESTORE FULL JSON SYSTEM
      const handleDownloadFullBackup = () => {
        const allDataPayload = {
          users, clubsData, uktEvents, championships, articles,
          uktRegistrations, champRegistrations, athletePoints,
          historicalRaports, attendances, sppBills, sppPayments, sanctions, featureSettings
        };
        const blob = new Blob([JSON.stringify(allDataPayload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `Backup_Full_Sistem_TIMura_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        triggerToast("Backup seluruh sistem berhasil diunduh!", "success");
      };

      const handleUploadFullBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            let count = 0;
            if(parsed.users) { parsed.users.forEach(item => {addUser(item); count++;}); }
            if(parsed.clubsData) { parsed.clubsData.forEach(item => {addClub(item); count++;}); }
            if(parsed.uktEvents) { parsed.uktEvents.forEach(item => {addUktEvent(item); count++;}); }
            if(parsed.championships) { parsed.championships.forEach(item => {addChamp(item); count++;}); }
            if(parsed.articles) { parsed.articles.forEach(item => {addArticle(item); count++;}); }
            if(parsed.uktRegistrations) { parsed.uktRegistrations.forEach(item => {addUktReg(item); count++;}); }
            if(parsed.champRegistrations) { parsed.champRegistrations.forEach(item => {addChampReg(item); count++;}); }
            if(parsed.athletePoints) { parsed.athletePoints.forEach(item => {addPoint(item); count++;}); }
            if(parsed.historicalRaports) { parsed.historicalRaports.forEach(item => {addRaport(item); count++;}); }
            if(parsed.attendances) { parsed.attendances.forEach(item => {addAttendance(item); count++;}); }
            if(parsed.sppBills) { parsed.sppBills.forEach(item => {addSppBill(item); count++;}); }
            if(parsed.sppPayments) { parsed.sppPayments.forEach(item => {addSppPayment(item); count++;}); }
            if(parsed.sanctions) { parsed.sanctions.forEach(item => {addSanction(item); count++;}); }
            if(parsed.featureSettings) { updateFeatureSettingsOnDb(parsed.featureSettings); }
            
            triggerToast(`Pemulihan berhasil! ${count} entri data direstore.`, "success");
          } catch(err) {
            triggerToast("Gagal membaca file backup JSON.", "error");
          }
        };
        reader.readAsText(file);
      };

      // FUNGSI NAVIGASI NOTIFIKASI LONCENG
      const handleBellClick = () => {
        // Tandai semua pengumuman sebagai telah dilihat/dibaca saat lonceng diklik
        setSeenAnnouncementsCount(articles.filter(a => a.category === 'Pengumuman').length);
        
        if (currentTab !== 'home') {
          setCurrentTab('home');
          // Beri sedikit delay agar komponen Home selesai dirender sebelum melakukan scroll
          setTimeout(() => {
            const el = document.getElementById('pengumuman-section');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 150);
        } else {
          const el = document.getElementById('pengumuman-section');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      };

      // Hitung notifikasi "Pengumuman"
      const totalAnnouncements = articles.filter(a => a.category === 'Pengumuman').length;
      const unreadCount = Math.max(0, totalAnnouncements - seenAnnouncementsCount);

      const renderContent = () => {
        switch (currentTab) {
          case 'home': return <Dashboard user={activeUser} articles={articles} addArticle={addArticle} updateArticle={updateArticle} deleteArticle={deleteArticle} users={users} uktRegistrations={uktRegistrations} athletePoints={athletePoints} triggerToast={triggerToast} sppBills={sppBills} sppPayments={sppPayments} updateSppPayment={updateSppPayment} setCurrentTab={setCurrentTab} setPendingAdminTab={setPendingAdminTab} uktEvents={uktEvents} championships={championships} featureSettings={featureSettings} sanctions={sanctions} attendances={attendances} dismissedNotifs={dismissedNotifs} setDismissedNotifs={setDismissedNotifs} />;
          case 'profil': return <ProfilView user={activeUser} users={users} updateUser={updateUser} points={athletePoints} triggerToast={triggerToast} featureSettings={featureSettings} />;
          
          case 'administrasi': 
            if (!isFeatureAllowed(activeUser.role, 'absensi') && !isFeatureAllowed(activeUser.role, 'spp') && !isFeatureAllowed(activeUser.role, 'sanksi')) {
              return <div className="text-center py-10 font-bold text-gray-400">Anda tidak diizinkan mengakses modul ini.</div>;
            }
            return <AdministrasiView user={activeUser} users={users} updateUser={updateUser} clubs={clubs} attendances={attendances} addAttendance={addAttendance} updateAttendance={updateAttendance} deleteAttendance={deleteAttendance} sppBills={sppBills} addSppBill={addSppBill} updateSppBill={updateSppBill} deleteSppBill={deleteSppBill} sppPayments={sppPayments} addSppPayment={addSppPayment} updateSppPayment={updateSppPayment} deleteSppPayment={deleteSppPayment} sanctions={sanctions} addSanction={addSanction} updateSanction={updateSanction} deleteSanction={deleteSanction} triggerToast={triggerToast} isFeatureAllowed={isFeatureAllowed} featureSettings={featureSettings} initialTab={pendingAdminTab} onTabConsumed={() => setPendingAdminTab(null)} />;
          
          case 'ukt': 
            if (!isFeatureAllowed(activeUser.role, 'ukt')) {
              return <div className="text-center py-10 font-bold text-gray-400">Anda tidak diizinkan mengakses modul UKT.</div>;
            }
            return <UKTView user={activeUser} events={uktEvents} addUktEvent={addUktEvent} updateUktEvent={updateUktEvent} deleteUktEvent={deleteUktEvent} registrations={uktRegistrations} addUktReg={addUktReg} updateUktReg={updateUktReg} users={users} updateUser={updateUser} points={athletePoints} addPoint={addPoint} historicalRaports={historicalRaports} addRaport={addRaport} updateRaport={updateRaport} deleteRaport={deleteRaport} triggerToast={triggerToast} />;
          
          case 'kejuaraan': 
            if (!isFeatureAllowed(activeUser.role, 'kejuaraan')) {
              return <div className="text-center py-10 font-bold text-gray-400">Anda tidak diizinkan mengakses modul Event.</div>;
            }
            return <ChampionshipView user={activeUser} events={championships} addChamp={addChamp} updateChamp={updateChamp} deleteChamp={deleteChamp} registrations={champRegistrations} addChampReg={addChampReg} updateChampReg={updateChampReg} triggerToast={triggerToast} users={users} points={athletePoints} addPoint={addPoint} />;
          
          case 'poin': 
            if (!isFeatureAllowed(activeUser.role, 'poin')) {
              return <div className="text-center py-10 font-bold text-gray-400">Anda tidak diizinkan mengakses modul Poin.</div>;
            }
            return <PointsView user={activeUser} points={athletePoints} addPoint={addPoint} updatePoint={updatePoint} deletePoint={deletePoint} users={users} triggerToast={triggerToast} />;
          
          case 'akun': return <AccountManager user={activeUser} users={users} addUser={addUser} updateUser={updateUser} deleteUser={deleteUser} clubs={clubs} addClub={addClub} deleteClub={deleteClub} triggerToast={triggerToast} featureSettings={featureSettings} updateFeatureSettings={updateFeatureSettingsOnDb} />;
          default: return <Dashboard user={activeUser} articles={articles} addArticle={addArticle} updateArticle={updateArticle} deleteArticle={deleteArticle} users={users} uktRegistrations={uktRegistrations} athletePoints={athletePoints} triggerToast={triggerToast} sppBills={sppBills} sppPayments={sppPayments} updateSppPayment={updateSppPayment} setCurrentTab={setCurrentTab} uktEvents={uktEvents} championships={championships} featureSettings={featureSettings} sanctions={sanctions} attendances={attendances} dismissedNotifs={dismissedNotifs} setDismissedNotifs={setDismissedNotifs} />;
        }
      };

      return (
        <div className="app-wrapper bg-gray-100 flex justify-center w-full overflow-hidden relative print:h-auto print:overflow-visible">
          <div className="w-full max-w-md bg-white shadow-2xl flex flex-col relative h-full print:h-auto print:block">
            <header className="bg-red-700 text-white p-4 flex justify-between items-center shadow-md shrink-0 z-20 no-print">
              <div className="flex items-center gap-2">
                {featureSettings?.branding?.logo ? (
                  <img src={featureSettings.branding.logo} alt="Logo" className="w-8 h-8 object-contain bg-white rounded-md p-0.5" />
                ) : (
                  <Icon name="Activity" className="w-6 h-6 animate-pulse" />
                )}
                <div><h1 className="font-extrabold text-lg tracking-tight">TI Mura</h1><p className="text-[10px] text-red-200 font-bold">Taekwondo Musi Rawas</p></div>
              </div>
              <div className="flex gap-1.5 items-center">
                {/* Fitur Lonceng Notifikasi */}
                <button onClick={handleBellClick} className="relative p-1.5 hover:bg-red-800 rounded-xl transition shadow-sm text-white" title="Pengumuman Terbaru">
                  <Icon name="Bell" className="w-5 h-5" />
                  {unreadCount > 0 && (
                    <span className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-yellow-400 text-red-900 text-[9px] font-black flex items-center justify-center rounded-full border border-red-700 shadow-sm animate-pulse">
                      {unreadCount}
                    </span>
                  )}
                </button>

                {activeUser.role === 'super_admin' && (
                  <>
                    <button onClick={handleSyncAllToSheets} className="p-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-xl transition shadow-sm text-white" title="Sync ke Google Sheets">
                      <Icon name="RefreshCcw" className="w-4 h-4" />
                    </button>
                    <button onClick={handleDownloadFullBackup} className="p-1.5 bg-blue-600 hover:bg-blue-500 rounded-xl transition shadow-sm text-white" title="Download Backup Sistem">
                      <Icon name="DownloadCloud" className="w-4 h-4" />
                    </button>
                    <label className="p-1.5 bg-amber-600 hover:bg-amber-500 rounded-xl transition shadow-sm text-white cursor-pointer" title="Restore Backup Sistem">
                      <Icon name="UploadCloud" className="w-4 h-4" />
                      <input type="file" accept=".json" className="hidden" onChange={handleUploadFullBackup} />
                    </label>
                  </>
                )}
                {activeUser.avatar ? <img src={activeUser.avatar} alt="Profile" className="w-8 h-8 rounded-full border-2 border-white object-cover cursor-pointer shadow-sm hover:scale-105 transition ml-1" onClick={() => setCurrentTab('profil')} /> : <Icon name="UserCircle" className="w-8 h-8 cursor-pointer hover:text-red-200 transition ml-1" onClick={() => setCurrentTab('profil')} />}
                <button onClick={() => { setUser(null); triggerToast('Anda telah keluar dari sistem.'); }} className="p-2 bg-red-800 hover:bg-red-900 rounded-xl transition ml-0.5"><Icon name="LogOut" className="w-4 h-4" /></button>
              </div>
            </header>
            {toast.show && <div className="absolute top-20 left-4 right-4 z-50 animate-bounce no-print"><div className={`p-3.5 rounded-2xl shadow-xl flex items-center gap-2 border text-xs font-bold ${toast.type === 'success' ? 'bg-green-50 text-green-800 border-green-200' : 'bg-red-50 text-red-800 border-red-200'}`}>{toast.type === 'success' ? <Icon name="CheckCircle" className="w-5 h-5 text-green-600 shrink-0" /> : <Icon name="XCircle" className="w-5 h-5 text-red-600 shrink-0" />}<span>{toast.message}</span></div></div>}
            <main className="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50 pb-6 print:overflow-visible">{renderContent()}</main>
            <nav className="shrink-0 w-full bg-white border-t border-gray-100 flex justify-around px-1 pt-2 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.06)] z-50 no-print relative">
              <NavItem icon="Home" label="Beranda" active={currentTab === 'home'} onClick={() => setCurrentTab('home')} />
              <NavItem icon="ClipboardCheck" label="Admin" active={currentTab === 'administrasi'} onClick={() => setCurrentTab('administrasi')} />
              <NavItem icon="FileText" label="UKT" active={currentTab === 'ukt'} onClick={() => setCurrentTab('ukt')} />
              <NavItem icon="Award" label="Event" active={currentTab === 'kejuaraan'} onClick={() => setCurrentTab('kejuaraan')} />
              <NavItem icon="Activity" label="Poin" active={currentTab === 'poin'} onClick={() => setCurrentTab('poin')} />
              {(user.role === 'super_admin' || user.role === 'pengurus_club') && <NavItem icon="Users" label="Akun" active={currentTab === 'akun'} onClick={() => setCurrentTab('akun')} />}
            </nav>
          </div>
        </div>
      );
    }

    function ProfilView({ user, users, updateUser, points, triggerToast, featureSettings }) {
      const [isEditing, setIsEditing] = useState(false); 
      const [showKta, setShowKta] = useState(false);
      const [formData, setFormData] = useState({ ...user });
      
      const kyorugiHistory = points ? points.filter(p => p.athleteId === user.id && p.category === 'Kyorugi') : [];
      const poomsaeHistory = points ? points.filter(p => p.athleteId === user.id && p.category === 'Poomsae') : [];
      
      // Data riwayat perolehan poin keseluruhan khusus Atlet
      const myPointsHistory = points ? points.filter(p => p.athleteId === user.id) : [];
      
      const handleImageChange = (e) => { 
        const file = e.target.files[0]; 
        if (file) { 
          const reader = new FileReader(); 
          reader.onloadend = () => { 
            setFormData({ ...formData, avatar: reader.result }); 
            updateUser(user.id, { ...user, avatar: reader.result }); 
            triggerToast("Foto profil disimpan ke Database!"); 
          }; 
          reader.readAsDataURL(file); 
        } 
      };
      
      const handleSave = (e) => { 
        e.preventDefault(); 
        updateUser(user.id, formData); 
        setIsEditing(false); 
        triggerToast("Data identitas diperbarui (DB)!"); 
      };

      return (
        <div className="space-y-4 pb-10">
          <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm flex flex-col items-center relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-24 bg-red-700 opacity-10"></div>
            <div className="relative group z-10">{formData.avatar || user.avatar ? <img src={formData.avatar || user.avatar} alt="Profile" className="w-24 h-24 rounded-full object-cover border-4 border-white shadow-lg" /> : <Icon name="UserCircle" className="w-24 h-24 text-gray-300 bg-white rounded-full border-4 border-white shadow-lg" />}<label className="absolute bottom-0 right-0 bg-red-600 text-white p-2 rounded-full cursor-pointer shadow-lg hover:bg-red-700 transition"><Icon name="Camera" className="w-4 h-4" /><input type="file" accept="image/*" className="hidden" onChange={handleImageChange} /></label></div>
            <h3 className="mt-4 font-black text-xl text-gray-800 z-10">{user.name}</h3>
            <span className="bg-red-50 text-red-800 px-3 py-1 rounded-full text-xs font-bold mt-1 capitalize tracking-widest z-10">{user.role.replace('_', ' ')}</span>
            <button onClick={() => setShowKta(true)} className="mt-3 bg-red-700 text-white text-[10px] px-4 py-2 rounded-full font-bold shadow-sm flex items-center gap-1.5 z-10 relative hover:bg-red-800 transition"><Icon name="CreditCard" className="w-3.5 h-3.5" /> Lihat KTA Virtual</button>
          </div>

          {!isEditing ? (
            <div className="space-y-4">
              <div className="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm space-y-4">
                <div className="flex justify-between items-center border-b pb-2"><span className="font-extrabold text-sm text-gray-800 flex items-center gap-1.5"><Icon name="User" className="w-4 h-4 text-red-600" /> Data Diri</span><button onClick={() => setIsEditing(true)} className="text-blue-600 hover:text-blue-800 text-xs font-bold flex items-center gap-1"><Icon name="Edit" className="w-3.5 h-3.5" /> Edit Data</button></div>
                <div className="space-y-3 text-xs">
                  <div className="flex flex-col gap-0.5"><span className="text-gray-400 font-bold uppercase text-[9px]">No. Registrasi / Sertifikat</span> <span className="font-bold text-gray-800">{user.regNo || '-'}</span></div>
                  <div className="flex flex-col gap-0.5"><span className="text-gray-400 font-bold uppercase text-[9px]">Tempat, Tanggal Lahir</span> <span className="font-bold text-gray-800">{user.placeOfBirth || '-'}, {user.dateOfBirth || '-'}</span></div>
                  <div className="flex flex-col gap-0.5"><span className="text-gray-400 font-bold uppercase text-[9px]">Jenis Kelamin</span> <span className="font-bold text-gray-800">{user.gender || '-'}</span></div>
                  <div className="flex flex-col gap-0.5"><span className="text-gray-400 font-bold uppercase text-[9px]">Email</span> <span className="font-bold text-gray-800">{user.email}</span></div>
                  
                  {user.role === 'pelatih' && user.license && (
                    <div className="flex flex-col gap-0.5 border-t pt-2 mt-1"><span className="text-red-700 font-black uppercase text-[9px]">Lisensi Kepelatihan Resmi:</span> <span className="font-extrabold text-red-800 text-xs bg-red-50 p-2 rounded-lg border border-red-100 mt-1">{user.license}</span></div>
                  )}

                  <div className="flex justify-between border-t pt-3 mt-1 items-center"><span className="text-gray-500 font-bold">Unit Latihan (Club):</span> <span className="font-black text-red-800">{user.club}</span></div>
                  {(user.role === 'atlet' || user.role === 'pelatih') && <div className="flex justify-between items-center"><span className="text-gray-500 font-bold">Tingkatan Sabuk:</span> <span className={getBeltBadgeClass(user.sabuk)}>{user.sabuk}</span></div>}
                </div>
              </div>

              {(user.role === 'atlet') && (
                <>
                  <div className="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm space-y-3">
                    <div className="border-b pb-2"><span className="font-extrabold text-sm text-gray-800 flex items-center gap-1.5"><Icon name="Crosshair" className="w-4 h-4 text-red-600" /> Riwayat Kyorugi (Pertarungan)</span></div>
                    {kyorugiHistory.length > 0 ? kyorugiHistory.map(hist => (
                      <div key={hist.id} className="bg-gray-50 p-3 rounded-2xl border flex justify-between items-center mb-2">
                        <div>
                          <div className="font-bold text-sm text-gray-800">{hist.eventName}</div>
                          <div className="text-[10px] text-gray-500 font-semibold mt-0.5">{hist.level} | Kelas: <span className="text-red-700">{hist.weightClass || '-'}</span></div>
                        </div>
                        <div className="text-right">
                          <span className={`px-2 py-0.5 rounded-md text-[10px] font-black uppercase shadow-sm ${hist.achievement.includes('Emas') ? 'bg-yellow-100 text-yellow-700 border border-yellow-200' : hist.achievement.includes('Perak') ? 'bg-gray-200 text-gray-700 border border-gray-300' : hist.achievement.includes('Perunggu') ? 'bg-orange-100 text-orange-800 border border-orange-200' : 'bg-blue-50 text-blue-700 border border-blue-200'}`}>{hist.achievement}</span>
                        </div>
                      </div>
                    )) : <p className="text-xs text-center text-gray-400 font-medium italic">Belum ada rekam pertandingan Kyorugi.</p>}
                  </div>

                  <div className="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm space-y-3">
                    <div className="border-b pb-2"><span className="font-extrabold text-sm text-gray-800 flex items-center gap-1.5"><Icon name="Activity" className="w-4 h-4 text-red-600" /> Riwayat Poomsae (Jurus)</span></div>
                    {poomsaeHistory.length > 0 ? poomsaeHistory.map(hist => (
                      <div key={hist.id} className="bg-gray-50 p-3 rounded-2xl border flex justify-between items-center mb-2">
                        <div>
                          <div className="font-bold text-sm text-gray-800">{hist.eventName}</div>
                          <div className="text-[10px] text-gray-500 font-semibold mt-0.5">{hist.level} | Kategori: <span className="text-red-700">{hist.poomsaeCategory || '-'}</span></div>
                        </div>
                        <div className="text-right flex flex-col items-end gap-1">
                          <span className={`px-2 py-0.5 rounded-md text-[10px] font-black uppercase shadow-sm ${
                            hist.achievement.includes('Emas') 
                              ? 'bg-yellow-100 text-yellow-700 border border-yellow-200' 
                              : hist.achievement.includes('Perak') 
                                ? 'bg-gray-200 text-gray-700 border border-gray-300' 
                                : hist.achievement.includes('Perunggu') 
                                  ? 'bg-orange-100 text-orange-800 border border-orange-200' 
                                  : 'bg-blue-50 text-blue-700 border border-blue-200'
                          }`}>{hist.achievement}</span>
                          {hist.score && <span className="text-[10px] font-bold text-gray-500">Skor: {hist.score}</span>}
                        </div>
                      </div>
                    )) : <p className="text-xs text-center text-gray-400 font-medium italic">Belum ada rekam pertandingan Poomsae.</p>}
                  </div>
                  
                  {/* Bagian Riwayat Perolehan Poin yang diminta */}
                  <div className="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm space-y-3">
                    <div className="border-b pb-2 flex justify-between items-center">
                       <span className="font-extrabold text-sm text-gray-800 flex items-center gap-1.5">
                         <Icon name="List" className="w-4 h-4 text-red-600" /> Riwayat Poin Prestasi
                       </span>
                       <span className="bg-red-50 text-red-800 text-[10px] font-black px-2 py-1 rounded-lg border border-red-100">
                         Total: {myPointsHistory.reduce((sum, p) => sum + p.points, 0)} POIN
                       </span>
                    </div>
                    {myPointsHistory.length > 0 ? myPointsHistory.slice().reverse().map(p => (
                      <div key={p.id} className="bg-gray-50 p-3 rounded-2xl border flex justify-between items-center mb-2">
                        <div>
                          <div className="font-bold text-sm text-gray-800 pr-1">{p.eventName}</div>
                          <div className="text-[9px] text-gray-500 font-bold mt-0.5 bg-gray-200 px-1.5 py-0.5 rounded inline-block">{p.category} | {p.division || p.level}</div>
                        </div>
                        <div className="text-right flex flex-col items-end gap-1">
                          <span className="px-2 py-0.5 rounded-md text-[9px] font-black uppercase shadow-sm bg-white border border-gray-200">{p.achievement}</span>
                          <span className="text-[11px] font-black text-red-600">+{p.points} POIN</span>
                        </div>
                      </div>
                    )) : <p className="text-xs text-center text-gray-400 font-medium italic py-2">Belum ada riwayat perolehan poin yang tercatat.</p>}
                  </div>
                </>
              )}
            </div>
          ) : (
            <form onSubmit={handleSave} className="bg-red-50 p-4 rounded-3xl border border-red-100 space-y-3"><div className="flex justify-between items-center pb-2 border-b border-red-200"><span className="font-extrabold text-sm text-red-900">Edit Identitas Pribadi</span><button type="button" onClick={() => setIsEditing(false)} className="text-gray-400 hover:text-red-700"><Icon name="XCircle" className="w-5 h-5" /></button></div>
              <div><label className="block text-[10px] font-bold text-gray-700 uppercase mb-1">Nama Lengkap</label><input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full text-xs p-2 bg-white border rounded-xl" required /></div>
              <div><label className="block text-[10px] font-bold text-gray-700 uppercase mb-1">No. Registrasi / Sertifikat</label><input type="text" value={formData.regNo || ''} onChange={e => setFormData({...formData, regNo: e.target.value})} className="w-full text-xs p-2 bg-white border rounded-xl" /></div>
              <div className="grid grid-cols-2 gap-2">
                <div><label className="block text-[10px] font-bold text-gray-700 uppercase mb-1">Tempat Lahir</label><input type="text" value={formData.placeOfBirth || ''} onChange={e => setFormData({...formData, placeOfBirth: e.target.value})} className="w-full text-xs p-2 bg-white border rounded-xl" /></div>
                <div><label className="block text-[10px] font-bold text-gray-700 uppercase mb-1">Tanggal Lahir</label><input type="date" value={formData.dateOfBirth || ''} onChange={e => setFormData({...formData, dateOfBirth: e.target.value})} className="w-full text-xs p-2 bg-white border rounded-xl" /></div>
              </div>
              <div><label className="block text-[10px] font-bold text-gray-700 uppercase mb-1">Email</label><input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full text-xs p-2 bg-white border rounded-xl" required /></div>
              <button type="submit" className="w-full bg-red-700 text-white py-2.5 rounded-xl font-bold text-xs shadow mt-2">Simpan Perubahan ke DB</button>
            </form>
          )}

          {/* Menampilkan Modul KTA apabila State true */}
          {showKta && <KtaModal user={user} onClose={() => setShowKta(false)} triggerToast={triggerToast} featureSettings={featureSettings} />}
        </div>
      );
    }

    function AdministrasiView({ user, users, updateUser, clubs, attendances, addAttendance, updateAttendance, deleteAttendance, sppBills, addSppBill, updateSppBill, deleteSppBill, sppPayments, addSppPayment, updateSppPayment, deleteSppPayment, sanctions, addSanction, updateSanction, deleteSanction, triggerToast, isFeatureAllowed, featureSettings, initialTab, onTabConsumed }) {
      const getFirstAllowedTab = () => {
        if (isFeatureAllowed(user.role, 'absensi')) return 'absensi';
        if (isFeatureAllowed(user.role, 'spp')) return 'spp';
        return 'sanksi';
      };

      const [activeTab, setActiveTab] = useState(() => {
        if (initialTab && isFeatureAllowed(user.role, initialTab)) return initialTab;
        return getFirstAllowedTab();
      });

      useEffect(() => {
        if (initialTab && isFeatureAllowed(user.role, initialTab)) {
          setActiveTab(initialTab);
          if (onTabConsumed) onTabConsumed();
        }
      }, [initialTab]);

      useEffect(() => {
        if (!initialTab) setActiveTab(getFirstAllowedTab());
      }, [user.role, featureSettings]);

      return (
        <div className="space-y-4">
          <div className="flex bg-gray-200 p-1 rounded-xl">
            {isFeatureAllowed(user.role, 'absensi') && (
              <button onClick={() => setActiveTab('absensi')} className={`flex-1 py-1.5 text-xs rounded-lg font-bold transition-all ${activeTab === 'absensi' ? 'bg-white text-red-700 shadow-sm' : 'text-gray-500'}`}>Absensi</button>
            )}
            {isFeatureAllowed(user.role, 'spp') && (
              <button onClick={() => setActiveTab('spp')} className={`flex-1 py-1.5 text-xs rounded-lg font-bold transition-all ${activeTab === 'spp' ? 'bg-white text-red-700 shadow-sm' : 'text-gray-500'}`}>Tagihan & Kas</button>
            )}
            {isFeatureAllowed(user.role, 'sanksi') && (
              <button onClick={() => setActiveTab('sanksi')} className={`flex-1 py-1.5 text-xs rounded-lg font-bold transition-all ${activeTab === 'sanksi' ? 'bg-white text-red-700 shadow-sm' : 'text-gray-500'}`}>Sanksi</button>
            )}
          </div>
          {activeTab === 'absensi' && isFeatureAllowed(user.role, 'absensi') && <AbsensiView user={user} users={users} clubs={clubs} attendances={attendances} addAttendance={addAttendance} updateAttendance={updateAttendance} deleteAttendance={deleteAttendance} triggerToast={triggerToast} />}
          {activeTab === 'spp' && isFeatureAllowed(user.role, 'spp') && <SPPView user={user} users={users} clubs={clubs} sppBills={sppBills} addSppBill={addSppBill} updateSppBill={updateSppBill} deleteSppBill={deleteSppBill} sppPayments={sppPayments} addSppPayment={addSppPayment} updateSppPayment={updateSppPayment} deleteSppPayment={deleteSppPayment} triggerToast={triggerToast} />}
          {activeTab === 'sanksi' && isFeatureAllowed(user.role, 'sanksi') && <SanksiView user={user} users={users} updateUser={updateUser} sanctions={sanctions} addSanction={addSanction} updateSanction={updateSanction} deleteSanction={deleteSanction} triggerToast={triggerToast} />}
        </div>
      );
    }

    function AbsensiView({ user, users, clubs, attendances, addAttendance, updateAttendance, deleteAttendance, triggerToast }) {
      const [absensiDate, setAbsensiDate] = useState(new Date().toISOString().split('T')[0]); 
      const [selectedClub, setSelectedClub] = useState(user.club || clubs[0]); 
      const [absensiData, setAbsensiData] = useState({});
      const [showRekap, setShowRekap] = useState(false);
      const [showQrScanner, setShowQrScanner] = useState(false);
      const [scannedResult, setScannedResult] = useState(null);
      const [rekapStartDate, setRekapStartDate] = useState(() => { const d = new Date(); d.setDate(1); return d.toISOString().split('T')[0]; });
      const [rekapEndDate, setRekapEndDate] = useState(new Date().toISOString().split('T')[0]);
      const [rekapClub, setRekapClub] = useState(user.club || clubs[0]);
      
      const canInputAbsensi = user.role === 'super_admin' || user.role === 'pengurus_club';
      const isPelatih = user.role === 'pelatih';
      const isAtlet = user.role === 'atlet';

      useEffect(() => { 
        if (!canInputAbsensi) return; 
        const newData = {}; 
        users.filter(u => u.role === 'atlet' && (selectedClub === 'Semua Club' ? true : u.club === selectedClub)).forEach(a => { 
          const existing = attendances.find(att => att.date === absensiDate && att.athleteId === a.id); 
          newData[a.id] = existing ? existing.status : 'Hadir'; 
        }); 
        setAbsensiData(newData); 
      }, [selectedClub, absensiDate, canInputAbsensi, users, attendances]);
      
      const filteredAthletes = users.filter(u => u.role === 'atlet' && (selectedClub === 'Semua Club' ? true : u.club === selectedClub));
      const pelatihViewAthletes = users.filter(u => u.role === 'atlet' && u.club === user.club);
      const myAttendances = attendances.filter(a => a.athleteId === user.id).sort((a,b) => new Date(b.date) - new Date(a.date));

      // --- Rekap Absensi Logic ---
      const rekapAthletes = users.filter(u => {
        if (u.role !== 'atlet') return false;
        if (user.role === 'super_admin') {
          return rekapClub === 'Semua Club' ? true : u.club === rekapClub;
        }
        return u.club === user.club;
      });

      const rekapDates = [...new Set(attendances
        .filter(a => {
          if (user.role === 'super_admin') {
            return rekapClub === 'Semua Club' ? true : a.club === rekapClub;
          }
          return a.club === user.club;
        })
        .map(a => a.date)
      )].filter(d => d >= rekapStartDate && d <= rekapEndDate).sort();

      const getAthleteStatusOnDate = (athleteId, date) => {
        const rec = attendances.find(a => a.athleteId === athleteId && a.date === date);
        return rec ? rec.status : '-';
      };

      const handleDownloadRekapPDF = () => {
        if (rekapAthletes.length === 0 || rekapDates.length === 0) {
          triggerToast("Tidak ada data absensi untuk diunduh!", "error");
          return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: rekapDates.length > 5 ? 'landscape' : 'portrait', unit: 'mm', format: 'a4' });

        // Header
        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.text("REKAP ABSENSI LATIHAN", doc.internal.pageSize.getWidth() / 2, 15, { align: 'center' });
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        doc.text("Taekwondo Indonesia - Kabupaten Musi Rawas", doc.internal.pageSize.getWidth() / 2, 20, { align: 'center' });
        doc.setFontSize(8);
        doc.text(`Periode: ${rekapStartDate} s/d ${rekapEndDate} | Club: ${user.role === 'super_admin' ? rekapClub : user.club}`, doc.internal.pageSize.getWidth() / 2, 25, { align: 'center' });

        // Table
        const headers = ['No', 'Nama Atlet', ...rekapDates.map(d => { const parts = d.split('-'); return `${parts[2]}/${parts[1]}`; }), 'Hadir', 'Izin', 'Sakit', 'Alpa'];
        const body = rekapAthletes.map((atlet, idx) => {
          const statuses = rekapDates.map(d => getAthleteStatusOnDate(atlet.id, d));
          const hadir = statuses.filter(s => s === 'Hadir').length;
          const izin = statuses.filter(s => s === 'Izin').length;
          const sakit = statuses.filter(s => s === 'Sakit').length;
          const alpa = statuses.filter(s => s === 'Alpa').length;
          return [idx + 1, atlet.name, ...statuses, hadir, izin, sakit, alpa];
        });

        doc.autoTable({
          startY: 30,
          head: [headers],
          body: body,
          styles: { fontSize: 6, cellPadding: 1.5, lineColor: [200, 200, 200], lineWidth: 0.2 },
          headStyles: { fillColor: [185, 28, 28], textColor: 255, fontSize: 6, fontStyle: 'bold', halign: 'center' },
          bodyStyles: { halign: 'center' },
          columnStyles: { 0: { cellWidth: 8 }, 1: { cellWidth: 30, halign: 'left' } },
          alternateRowStyles: { fillColor: [255, 245, 245] },
          didParseCell: function(data) {
            // Warna status di cell
            if (data.section === 'body' && data.column.index >= 2 && data.column.index < 2 + rekapDates.length) {
              const val = data.cell.raw;
              if (val === 'Hadir') { data.cell.styles.textColor = [22, 163, 74]; data.cell.styles.fontStyle = 'bold'; }
              else if (val === 'Izin') { data.cell.styles.textColor = [59, 130, 246]; data.cell.styles.fontStyle = 'bold'; }
              else if (val === 'Sakit') { data.cell.styles.textColor = [234, 179, 8]; data.cell.styles.fontStyle = 'bold'; }
              else if (val === 'Alpa') { data.cell.styles.textColor = [220, 38, 38]; data.cell.styles.fontStyle = 'bold'; }
              else { data.cell.styles.textColor = [156, 163, 175]; }
            }
            // Bold untuk kolom rekap
            if (data.section === 'body' && data.column.index >= 2 + rekapDates.length) {
              data.cell.styles.fontStyle = 'bold';
            }
          }
        });

        // Footer
        const pageHeight = doc.internal.pageSize.getHeight();
        doc.setFontSize(7);
        doc.setTextColor(150);
        doc.text(`Dicetak: ${new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })} | Sistem Informasi TI Musi Rawas`, doc.internal.pageSize.getWidth() / 2, pageHeight - 8, { align: 'center' });

        doc.save(`Rekap_Absensi_${rekapStartDate}_${rekapEndDate}.pdf`);
        triggerToast("Rekap Absensi berhasil diunduh (PDF)!");
      };

      const handleSaveAbsensi = (e) => { 
        e.preventDefault(); 
        Object.entries(absensiData).forEach(([athleteIdStr, status]) => {
           const idStr = `${absensiDate}_${athleteIdStr}`;
           const clubStr = users.find(u => String(u.id) === athleteIdStr)?.club;
           addAttendance({ id: idStr, date: absensiDate, club: clubStr, athleteId: Number(athleteIdStr), status });
        });
        triggerToast(`Data absensi tanggal ${absensiDate} tersimpan di Database!`); 
      };

      const handleDeleteAbsensiRecord = (atletId) => {
        const idStr = `${absensiDate}_${atletId}`;
        if(window.confirm('Hapus data absensi atlet ini pada tanggal tersebut?')) {
           deleteAttendance(idStr);
           setAbsensiData(prev => { const n = {...prev}; delete n[atletId]; return n; });
           triggerToast("Data absensi dihapus.");
        }
      };

      // --- QR Scanner untuk Absensi ---
      const QrScannerSection = () => {
        const scannerRef = React.useRef(null);
        const [scannerInstance, setScannerInstance] = useState(null);
        const [scanError, setScanError] = useState('');
        const [isScanning, setIsScanning] = useState(false);
        const [torchOn, setTorchOn] = useState(false);
        const [scanCount, setScanCount] = useState(0);
        const [lastScanName, setLastScanName] = useState('');
        const scanLockRef = React.useRef(false);

        const stopScanner = async (inst) => {
          try {
            if (inst && inst.isScanning) {
              await inst.stop();
            }
          } catch(e) {}
        };

        const startScanner = async (inst) => {
          if (!inst) return;
          try {
            scanLockRef.current = false;
            await inst.start(
              { facingMode: "environment" },
              {
                fps: 20,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                disableFlip: false
              },
              onScanSuccess,
              () => {}
            );
            setIsScanning(true);
            setScanError('');
          } catch(e) {
            try {
              await inst.start(
                { facingMode: "user" },
                {
                  fps: 20,
                  qrbox: { width: 250, height: 250 },
                  aspectRatio: 1.0,
                  disableFlip: false
                },
                onScanSuccess,
                () => {}
              );
              setIsScanning(true);
              setScanError('');
            } catch(e2) {
              setScanError('Gagal mengakses kamera. Pastikan izin kamera diaktifkan dan coba refresh halaman.');
              setIsScanning(false);
            }
          }
        };

        const onScanSuccess = async (decodedText) => {
          if (scanLockRef.current) return;
          scanLockRef.current = true;

          if (navigator.vibrate) navigator.vibrate(150);

          try {
            const data = JSON.parse(decodedText);
            if (data.a !== 'TI MURA KTA') {
              triggerToast("QR Code bukan KTA TI Mura yang valid!", "error");
              scanLockRef.current = false;
              return;
            }
            const foundUser = users.find(u => u.id === data.id && u.name === data.n);
            if (!foundUser) {
              triggerToast("Data anggota tidak ditemukan dalam sistem!", "error");
              scanLockRef.current = false;
              return;
            }
            if (foundUser.role !== 'atlet' && foundUser.role !== 'pelatih') {
              triggerToast("Hanya atlet/pelatih yang bisa diabsen via QR.", "error");
              scanLockRef.current = false;
              return;
            }
            const existingAtt = attendances.find(a => a.date === absensiDate && a.athleteId === foundUser.id);
            if (existingAtt) {
              triggerToast(`${foundUser.name} sudah tercatat ${existingAtt.status} pada ${absensiDate}.`, "error");
              scanLockRef.current = false;
              return;
            }
            const idStr = `${absensiDate}_${foundUser.id}`;
            addAttendance({ id: idStr, date: absensiDate, club: foundUser.club, athleteId: foundUser.id, status: 'Hadir' });
            setScannedResult({ name: foundUser.name, club: foundUser.club, sabuk: foundUser.sabuk, role: foundUser.role, regNo: foundUser.regNo });
            setScanCount(prev => prev + 1);
            setLastScanName(foundUser.name);
            triggerToast(`${foundUser.name} berhasil diabsen HADIR!`, "success");
          } catch(e) {
            triggerToast("QR Code tidak valid. Pastikan scan KTA TI Mura.", "error");
          }
          setTimeout(() => { scanLockRef.current = false; }, 1500);
        };

        useEffect(() => {
          const html5QrCode = new Html5Qrcode("qr-reader-absensi");
          setScannerInstance(html5QrCode);
          startScanner(html5QrCode);

          return () => {
            stopScanner(html5QrCode);
          };
        }, []);

        const toggleTorch = async () => {
          if (!scannerInstance) return;
          try {
            const state = scannerInstance.getRunningTrackCameraCapabilities();
            if (state && state.torchFeature && state.torchFeature.isSupported()) {
              const newState = !torchOn;
              await state.torchFeature.apply(newState);
              setTorchOn(newState);
            } else {
              triggerToast("Flashlight tidak didukung perangkat ini.", "error");
            }
          } catch(e) {
            triggerToast("Gagal mengaktifkan flashlight.", "error");
          }
        };

        const restartScanner = async () => {
          if (!scannerInstance) return;
          setScanError('');
          await stopScanner(scannerInstance);
          await startScanner(scannerInstance);
        };

        return (
          <div className="space-y-4 animate-fade-in">
            <div className="bg-white p-4 rounded-3xl border shadow-sm space-y-3">
              <div className="flex justify-between items-center border-b pb-2">
                <span className="font-extrabold text-xs text-red-800 uppercase flex items-center gap-1.5">
                  <Icon name="ScanLine" className="w-4 h-4 text-red-600" /> Scan QR KTA - Absensi
                </span>
                <div className="flex items-center gap-2">
                  {scanCount > 0 && <span className="bg-green-100 text-green-700 text-[10px] font-black px-2 py-0.5 rounded-full">{scanCount} Scan</span>}
                  <button onClick={() => { stopScanner(scannerInstance); setShowQrScanner(false); setScannedResult(null); }} className="text-gray-400 hover:text-red-600 transition"><Icon name="XCircle" className="w-6 h-6" /></button>
                </div>
              </div>

              <div className="text-center text-[10px] text-gray-500 font-bold uppercase">Arahkan kamera ke QR Code pada KTA Virtual</div>

              {/* Scanner Viewport */}
              <div className="relative rounded-xl overflow-hidden border-2 border-red-200 bg-black" style={{ minHeight: '280px' }}>
                <div id="qr-reader-absensi" style={{ width: '100%' }}></div>
                {!isScanning && !scanError && (
                  <div className="absolute inset-0 flex items-center justify-center bg-black/70 z-20">
                    <div className="text-white text-xs font-bold flex items-center gap-2"><Icon name="Loader2" className="w-5 h-5 animate-spin"/> Memulai kamera...</div>
                  </div>
                )}
              </div>

              {/* Controls */}
              <div className="grid grid-cols-2 gap-2">
                <button onClick={restartScanner} className="bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-xl font-bold text-[11px] flex justify-center items-center gap-1.5 transition">
                  <Icon name="RotateCcw" className="w-4 h-4"/> Restart Kamera
                </button>
                <button onClick={toggleTorch} className={`${torchOn ? 'bg-yellow-400 text-yellow-900' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'} py-2 rounded-xl font-bold text-[11px] flex justify-center items-center gap-1.5 transition`}>
                  <Icon name="Zap" className="w-4 h-4"/> {torchOn ? 'Flash ON' : 'Flash OFF'}
                </button>
              </div>

              {scanError && <div className="bg-red-50 text-red-700 p-3 rounded-xl text-xs font-bold text-center border border-red-200">{scanError}</div>}

              {/* Scan Result */}
              {scannedResult && (
                <div className="bg-green-50 p-4 rounded-xl border border-green-200 space-y-2 animate-fade-in">
                  <div className="text-center text-xs font-black text-green-800 uppercase flex items-center justify-center gap-1.5">
                    <Icon name="CheckCircle2" className="w-4 h-4 text-green-600"/> Absensi Berhasil!
                  </div>
                  <div className="bg-white p-3 rounded-lg border space-y-1.5">
                    <div className="flex justify-between text-xs"><span className="font-bold text-gray-500">Nama:</span><span className="font-black text-gray-800">{scannedResult.name}</span></div>
                    <div className="flex justify-between text-xs"><span className="font-bold text-gray-500">Club:</span><span className="font-bold text-gray-800">{scannedResult.club}</span></div>
                    <div className="flex justify-between text-xs"><span className="font-bold text-gray-500">No. Reg:</span><span className="font-bold text-gray-800 font-mono">{scannedResult.regNo || '-'}</span></div>
                    <div className="flex justify-between text-xs"><span className="font-bold text-gray-500">Status:</span><span className="font-black text-green-700 bg-green-100 px-2 py-0.5 rounded">HADIR</span></div>
                  </div>
                  <div className="text-center text-[10px] text-green-600 font-bold">Scanner aktif — Lanjut scan anggota berikutnya</div>
                </div>
              )}
            </div>
            <button onClick={() => { stopScanner(scannerInstance); setShowQrScanner(false); setScannedResult(null); }} className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl font-bold text-xs transition">
              Kembali ke Absensi
            </button>
          </div>
        );
      };

      // --- Rekap Component ---
      const RekapAbsensiSection = () => (
        <div className="space-y-4 animate-fade-in">
          <div className="bg-white p-4 rounded-3xl border shadow-sm space-y-3">
            <span className="font-extrabold text-xs text-red-800 uppercase block border-b pb-1">Filter Rekap Absensi</span>
            <div className="grid grid-cols-2 gap-2">
              <div>
                <label className="block text-[10px] font-bold text-gray-700 uppercase mb-1">Dari Tanggal</label>
                <input type="date" value={rekapStartDate} onChange={e => setRekapStartDate(e.target.value)} className="w-full text-xs p-2.5 bg-gray-50 border rounded-xl" />
              </div>
              <div>
                <label className="block text-[10px] font-bold text-gray-700 uppercase mb-1">Sampai Tanggal</label>
                <input type="date" value={rekapEndDate} onChange={e => setRekapEndDate(e.target.value)} className="w-full text-xs p-2.5 bg-gray-50 border rounded-xl" />
              </div>
            </div>
            {user.role === 'super_admin' && (
              <div>
                <label className="block text-[10px] font-bold text-gray-700 uppercase mb-1">Club</label>
                <select value={rekapClub} onChange={e => setRekapClub(e.target.value)} className="w-full text-xs p-2.5 bg-gray-50 border rounded-xl">
                  <option value="Semua Club">Semua Club</option>
                  {clubs.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            )}
            <button onClick={handleDownloadRekapPDF} className="w-full bg-red-700 hover:bg-red-800 text-white py-2.5 rounded-xl font-bold text-xs shadow-md flex justify-center items-center gap-2 transition">
              <Icon name="Download" className="w-4 h-4"/> Unduh Rekap PDF
            </button>
          </div>

          {/* Preview Rekap Table */}
          {rekapAthletes.length > 0 && rekapDates.length > 0 && (
            <div className="bg-white p-3 rounded-2xl border shadow-sm overflow-x-auto">
              <div className="flex justify-between items-center mb-2">
                <span className="font-extrabold text-[10px] text-gray-600 uppercase">Preview Rekap ({rekapDates.length} hari latihan)</span>
              </div>
              <table className="w-full text-[9px] border-collapse min-w-max">
                <thead>
                  <tr className="bg-red-700 text-white">
                    <th className="p-1.5 text-left font-bold border border-red-600 min-w-[24px]">No</th>
                    <th className="p-1.5 text-left font-bold border border-red-600 min-w-[80px]">Nama Atlet</th>
                    {rekapDates.map(d => {
                      const parts = d.split('-');
                      return <th key={d} className="p-1 text-center font-bold border border-red-600 min-w-[32px]">{parts[2]}/{parts[1]}</th>;
                    })}
                    <th className="p-1 text-center font-bold border border-red-600 bg-green-700 min-w-[28px]">H</th>
                    <th className="p-1 text-center font-bold border border-red-600 bg-blue-700 min-w-[28px]">I</th>
                    <th className="p-1 text-center font-bold border border-red-600 bg-yellow-600 min-w-[28px]">S</th>
                    <th className="p-1 text-center font-bold border border-red-600 bg-red-800 min-w-[28px]">A</th>
                  </tr>
                </thead>
                <tbody>
                  {rekapAthletes.map((atlet, idx) => {
                    const statuses = rekapDates.map(d => getAthleteStatusOnDate(atlet.id, d));
                    const hadir = statuses.filter(s => s === 'Hadir').length;
                    const izin = statuses.filter(s => s === 'Izin').length;
                    const sakit = statuses.filter(s => s === 'Sakit').length;
                    const alpa = statuses.filter(s => s === 'Alpa').length;
                    return (
                      <tr key={atlet.id} className={idx % 2 === 0 ? 'bg-white' : 'bg-red-50/50'}>
                        <td className="p-1 font-bold text-center border border-gray-200">{idx + 1}</td>
                        <td className="p-1 font-bold text-gray-800 border border-gray-200 truncate max-w-[80px]">{atlet.name}</td>
                        {statuses.map((st, si) => (
                          <td key={si} className={`p-0.5 text-center font-bold border border-gray-200 ${st === 'Hadir' ? 'text-green-700' : st === 'Izin' ? 'text-blue-600' : st === 'Sakit' ? 'text-yellow-600' : st === 'Alpa' ? 'text-red-600' : 'text-gray-300'}`}>{st === '-' ? '-' : st[0]}</td>
                        ))}
                        <td className="p-1 text-center font-black text-green-700 border border-gray-200">{hadir}</td>
                        <td className="p-1 text-center font-black text-blue-600 border border-gray-200">{izin}</td>
                        <td className="p-1 text-center font-black text-yellow-600 border border-gray-200">{sakit}</td>
                        <td className="p-1 text-center font-black text-red-600 border border-gray-200">{alpa}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {rekapDates.length === 0 && (
            <div className="text-center text-xs text-gray-400 italic py-6 bg-white rounded-2xl border">
              Belum ada data absensi pada periode yang dipilih.
            </div>
          )}

          <button onClick={() => setShowRekap(false)} className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-xl font-bold text-xs transition">
            Kembali ke Input Absensi
          </button>
        </div>
      );

      if (showRekap) return <RekapAbsensiSection />;
      if (showQrScanner && (canInputAbsensi || isPelatih)) return <QrScannerSection />;

      if (isAtlet) {
        return (
          <div className="space-y-3 animate-fade-in">
            <h3 className="font-extrabold text-xs text-gray-500 uppercase border-b pb-2">Riwayat Kehadiran Latihan</h3>
            {myAttendances.length === 0 && <p className="text-xs text-gray-400 text-center italic py-4">Belum ada rekam jejak absensi.</p>}
            {myAttendances.map(att => (
              <div key={att.id} className="bg-white p-3.5 rounded-2xl border shadow-sm flex justify-between items-center">
                <span className="font-bold text-sm text-gray-800">{att.date}</span>

          <form onSubmit={handleSaveAbsensi} className="space-y-3">

    function SPPView({ user, users, clubs, sppBills, addSppBill, updateSppBill, deleteSppBill, sppPayments, addSppPayment, updateSppPayment, deleteSppPayment, triggerToast }) {
      const [showAddBill, setShowAddBill] = useState(false); 
      const [title, setTitle] = useState(''); 
      const [amount, setAmount] = useState(''); 
      const [type, setType] = useState('Bulanan'); 
      const [targetClub, setTargetClub] = useState('Semua Club');
      const [targetRole, setTargetRole] = useState('semua');
      
      const [editingBillId, setEditingBillId] = useState(null);
      const [editBillData, setEditBillData] = useState({});
      const [expandedBillId, setExpandedBillId] = useState(null);
      const [viewFilterRole, setViewFilterRole] = useState('semua');
      
      const isSuperAdmin = user.role === 'super_admin';
      const isPengurus = user.role === 'pengurus_club';
      const canManage = isSuperAdmin || isPengurus;
      
      const handleCreateBill = (e) => { 
        e.preventDefault(); 
        if (!title.trim() || !amount) { triggerToast("Lengkapi form!", "error"); return; } 
        const assignedClub = isSuperAdmin ? targetClub : user.club; 
        const newBillId = Date.now();
        addSppBill({ id: newBillId, title, type, amount: Number(amount), club: assignedClub, targetRole, creatorRole: user.role, date: new Date().toISOString().split('T')[0] }); 
        
        // Filter target akun berdasarkan Club dan Peran (Role) yang dipilih
        const targetUsers = users.filter(u => {
          // 1. Filter by Club
          const matchClub = assignedClub === 'Semua Club' ? true : u.club === assignedClub;
          if (!matchClub) return false;

          // 2. Filter by Role
          if (targetRole === 'semua') {
            if (isSuperAdmin) return ['atlet', 'pelatih', 'pengurus_club'].includes(u.role);
            return ['atlet', 'pelatih'].includes(u.role);
          }
          return u.role === targetRole;
        });

        if (targetUsers.length === 0) {
           triggerToast("Tidak ada anggota yang cocok dengan filter tagihan ini.", "error");
           return;
        }

        targetUsers.forEach((tu, idx) => {
          addSppPayment({
            id: Date.now() + idx + 100, 
            billId: newBillId,
            athleteId: tu.id, 
            status: 'pending',
            paymentDate: null
          });
        });

        setTitle(''); setAmount(''); setShowAddBill(false); 
        triggerToast(`Tagihan "${title}" berhasil disebar ke ${targetUsers.length} orang!`); 
      };

      const handleStartEditBill = (bill) => { setEditingBillId(bill.id); setEditBillData(bill); };
      const handleSaveEditBill = (e) => {
         e.preventDefault();
         updateSppBill(editingBillId, { ...editBillData, amount: Number(editBillData.amount) });
         setEditingBillId(null); triggerToast("Tagihan diperbarui!");
      };
      const handleDeleteBill = (id) => {
         if(window.confirm("Hapus tagihan ini secara permanen?")) {
             deleteSppBill(id); triggerToast("Tagihan dihapus!");
         }
      };
      
      const handlePaySPP = (paymentId) => { 
        const target = sppPayments.find(p => p.id === paymentId);
        updateSppPayment(paymentId, { ...target, status: 'pending_confirmation' }); 
        triggerToast("Pembayaran dilaporkan. Menunggu konfirmasi pengurus."); 
      };

      const handleConfirmAdminPay = (paymentId) => {
        const target = sppPayments.find(p => p.id === paymentId);
        updateSppPayment(paymentId, { ...target, status: 'paid', paymentDate: new Date().toISOString().split('T')[0] });
        triggerToast("Pembayaran telah dikonfirmasi LUNAS!");
      };

      const handleDeletePayment = (paymentId, userName) => {
        if (window.confirm(`Hapus tagihan untuk ${userName || 'anggota ini'}? Tagihan akan dihapus secara permanen.`)) {
          deleteSppPayment(paymentId);
          triggerToast("Tagihan anggota berhasil dihapus!");
        }
      };
      
      const myPayments = sppPayments.filter(p => p.athleteId === user.id);
      return (
        <div className="space-y-4">
          {canManage && <button onClick={() => setShowAddBill(!showAddBill)} className="w-full bg-red-700 text-white py-2.5 rounded-2xl font-bold text-xs shadow flex justify-center items-center gap-1.5"><Icon name="Plus" className="w-4 h-4 text-white" /> Terbitkan Tagihan Baru</button>}

              <Icon name="Filter" className="w-4 h-4 text-gray-500 shrink-0" />

                <option value="semua">Semua (Atlet & Pelatih)</option>
                <option value="atlet">Hanya Atlet</option>
                <option value="pelatih">Hanya Pelatih</option>
                {isSuperAdmin && <option value="pengurus_club">Hanya Pengurus Club</option>}

            </div>
          )}
          {showAddBill && (
            <form onSubmit={handleCreateBill} className="bg-red-50 p-4 rounded-3xl border border-red-100 space-y-3 animate-fade-in">
              <input type="text" placeholder="Judul Tagihan / Kegiatan" value={title} onChange={e => setTitle(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl" required />
              
              <div className="grid grid-cols-2 gap-2">
                 <select value={type} onChange={e => setType(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl">
                    <option value="Harian">Kas Harian</option>
                    <option value="Mingguan">Kas Mingguan</option>
                    <option value="Bulanan">Kas Bulanan</option>
                    <option value="Tahunan">Kas Tahunan</option>
                    <option value="Kegiatan">Event / Kegiatan Lain</option>
                 </select>
                 <input type="number" placeholder="Nominal (Rp)" value={amount} onChange={e => setAmount(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl" required />
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mt-1">
                 {isSuperAdmin && (
                   <select value={targetClub} onChange={e => setTargetClub(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl">
                     <option value="Semua Club">Semua Club</option>
                     {clubs.map(c => <option key={c} value={c}>{c}</option>)}
                   </select>
                 )}
                 <select value={targetRole} onChange={e => setTargetRole(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl bg-white focus:ring-1 focus:ring-red-500">
                    <option value="semua">Tujuan: Semua Anggota</option>
                    <option value="atlet">Tujuan: Hanya Atlet</option>
                    <option value="pelatih">Tujuan: Hanya Pelatih</option>
                    {isSuperAdmin && <option value="pengurus_club">Tujuan: Hanya Pengurus Club</option>}
                 </select>
              </div>

              <button type="submit" className="w-full bg-red-700 hover:bg-red-800 transition text-white py-2.5 rounded-xl font-bold text-xs shadow mt-1">Sebar Tagihan ke Anggota</button>
            </form>
          )}

          {canManage && (
            <div className="space-y-3 animate-fade-in">
               <h3 className="font-extrabold text-xs text-gray-400 uppercase border-b pb-1 border-gray-200">Kelola Tagihan Pusat (Admin)</h3>
               {sppBills.filter(b => isSuperAdmin || b.club === user.club).filter(bill => {
                 if (viewFilterRole === 'semua') return true;
                 if (bill.targetRole === viewFilterRole) return true;
                 if (bill.targetRole === 'semua') return true;
                 return false;
               }).map(bill => (
                  <div key={bill.id} className="bg-white p-3 rounded-2xl border shadow-sm">
                    {editingBillId === bill.id ? (
                      <form onSubmit={handleSaveEditBill} className="space-y-2 animate-fade-in">
                        <input type="text" value={editBillData.title} onChange={e => setEditBillData({...editBillData, title: e.target.value})} className="w-full text-xs p-2 border rounded-xl" required />
                        <div className="grid grid-cols-2 gap-2">
                           <input type="number" value={editBillData.amount} onChange={e => setEditBillData({...editBillData, amount: e.target.value})} className="w-full text-xs p-2 border rounded-xl" required />
                           <select value={editBillData.type} onChange={e => setEditBillData({...editBillData, type: e.target.value})} className="w-full text-xs p-2 border rounded-xl">
                              <option value="Harian">Kas Harian</option><option value="Mingguan">Kas Mingguan</option><option value="Bulanan">Kas Bulanan</option><option value="Tahunan">Kas Tahunan</option><option value="Kegiatan">Event / Kegiatan Lain</option>
                           </select>
                        </div>
                        <div className="flex gap-2">
                          <button type="submit" className="flex-1 bg-green-600 text-white py-1.5 rounded-lg text-[10px] font-bold">Simpan</button>
                          <button type="button" onClick={() => setEditingBillId(null)} className="flex-1 bg-gray-400 text-white py-1.5 rounded-lg text-[10px] font-bold">Batal</button>
                        </div>
                      </form>
                    ) : (
                      <div className="flex justify-between items-start">
                        <div>
                          <div className="font-bold text-sm text-gray-800">{bill.title}</div>
                          <div className="text-[10px] text-gray-500 font-medium">Rp {bill.amount.toLocaleString()} | {bill.type} | {bill.club}</div>
                          <div className="text-[9px] mt-1 font-bold inline-block px-1.5 py-0.5 rounded bg-amber-50 text-amber-700 border border-amber-100 uppercase">
                             Target: {bill.targetRole === 'semua' ? 'Semua Anggota' : bill.targetRole.replace('_', ' ')}
                          </div>
                        </div>
                        <div className="flex gap-1">
                          <button onClick={() => setExpandedBillId(expandedBillId === bill.id ? null : bill.id)} className={`p-1.5 rounded-lg transition-colors ${expandedBillId === bill.id ? 'bg-indigo-600 text-white' : 'bg-indigo-50 text-indigo-600'}`} title="Lihat Status Pembayaran Anggota"><Icon name="Users" className="w-3.5 h-3.5" /></button>
                          <button onClick={() => handleStartEditBill(bill)} className="p-1.5 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-lg"><Icon name="Edit" className="w-3.5 h-3.5" /></button>
                          <button onClick={() => handleDeleteBill(bill.id)} className="p-1.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg"><Icon name="Trash2" className="w-3.5 h-3.5" /></button>
                        </div>
                      </div>
                    )}

                    {expandedBillId === bill.id && (
                      <div className="mt-3 p-3 bg-gray-50 rounded-xl border border-gray-200 text-xs animate-fade-in">
                         <h4 className="font-bold mb-2 text-gray-700">Status Pembayaran Anggota:</h4>

                         {(() => {
                           const filtered = sppPayments.filter(p => p.billId === bill.id).filter(pay => {
                             if (viewFilterRole === 'semua') return true;
                             const uu = users.find(x => x.id === pay.athleteId);

                           const confirm = filtered.filter(p => p.status === 'pending_confirmation').length;
                           const pending = filtered.filter(p => p.status === 'pending').length;

                               <div className="bg-green-50 border border-green-200 rounded-lg p-1.5 text-center">
                                 <div className="text-green-700 font-black text-sm">{paid}</div>
                                 <div className="text-green-600 font-bold text-[8px] uppercase">Lunas</div>
                               </div>
                               <div className="bg-amber-50 border border-amber-200 rounded-lg p-1.5 text-center">
                                 <div className="text-amber-700 font-black text-sm">{confirm}</div>
                                 <div className="text-amber-600 font-bold text-[8px] uppercase">Konfirmasi</div>
                               </div>
                               <div className="bg-red-50 border border-red-200 rounded-lg p-1.5 text-center">
                                 <div className="text-red-700 font-black text-sm">{pending}</div>
                                 <div className="text-red-600 font-bold text-[8px] uppercase">Belum Bayar</div>
                               </div>
                             </div>
                           );
                         })()}
                         <div className="space-y-1.5 max-h-48 overflow-y-auto hide-scrollbar">

                            if (viewFilterRole === 'semua') return true;
                            const u = users.find(x => x.id === pay.athleteId);

                                    )}

                                  </div>

                            const uu = users.find(x => x.id === pay.athleteId);
                            return uu && uu.role === viewFilterRole;

          {myPayments.length > 0 && (
            <div className="space-y-3 animate-fade-in mt-4">
              <h3 className="font-extrabold text-xs text-gray-400 uppercase">Tagihan Saya</h3>

    function SanksiView({ user, users, updateUser, sanctions, addSanction, updateSanction, deleteSanction, triggerToast }) {
      const [showAdd, setShowAdd] = useState(false); 
      const [targetUserId, setTargetUserId] = useState(''); 
      const [reason, setReason] = useState('');
      const [sanctionLevel, setSanctionLevel] = useState('Ringan');
      const [suspendUntil, setSuspendUntil] = useState('');
      
      const [editingSanctionId, setEditingSanctionId] = useState(null);
      const [editSanctionData, setEditSanctionData] = useState({});

      const canIssueSanction = user.role === 'super_admin' || user.role === 'pengurus_club';
      
      const availableTargets = users.filter(u => {
        if (u.id === user.id) return false;
        if (user.role === 'super_admin') {
          return u.role === 'atlet' || u.role === 'pelatih' || u.role === 'pengurus_club';
        }
        if (user.role === 'pengurus_club') {
          return (u.role === 'atlet' || u.role === 'pelatih') && u.club === user.club;
        }
        return false;
      });

      const visibleSanctions = sanctions.filter(s => 
        user.role === 'super_admin' || 
        s.userId === user.id || 
        s.issuerId === user.id || 
        users.find(u => u.id === s.userId)?.club === user.club
      ).slice().reverse();
