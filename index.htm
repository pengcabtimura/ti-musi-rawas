        document.body.removeChild(link);
        triggerToast("Data UKT berhasil diunduh!");
      };

      // FITUR BARU: DOWNLOAD PESERTA UKT BERBENTUK PDF
      const handleDownloadUKTPDF = () => {
        if (visibleRegistrations.length === 0) {
          triggerToast("Belum ada data pendaftar UKT untuk diunduh sebagai PDF.", "error");
          return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Desain Kop Surat Resmi
        doc.setFontSize(13);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(185, 28, 28); // Warna Merah Red-700
        doc.text("PENGURUS KABUPATEN TAEKWONDO INDONESIA (TI)", 105, 15, { align: "center" });
        doc.text("KABUPATEN MUSI RAWAS", 105, 21, { align: "center" });
        
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(100, 116, 139); // Slate-500
        doc.text("Sekretariat: Kab. Musi Rawas, Sumatera Selatan", 105, 26, { align: "center" });
        
        // Garis Pembatas Kop
        doc.setLineWidth(0.8);
        doc.setDrawColor(30, 41, 59); // Slate-800
        doc.line(15, 29, 195, 29);
        
        doc.setFontSize(11);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(30, 41, 59);
        doc.text("DAFTAR PESERTA UJI KENAIKAN TINGKAT (UKT)", 105, 36, { align: "center" });

        // Menyusun Data untuk Tabel
        const headers = [["No", "Nama Lengkap", "Tempat Lahir", "Tgl Lahir", "No. Reg", "Sabuk Sekarang", "Sabuk Diuji"]];
        const tableData = visibleRegistrations.map((reg, index) => {
          const athlete = users.find(u => u.id === reg.athleteId);
          return [
            index + 1,
            athlete?.name || "-",
            athlete?.placeOfBirth || "-",
            athlete?.dateOfBirth || "-",
            athlete?.regNo || "-",
            athlete?.sabuk ? athlete.sabuk.split(' (')[0] : "Sabuk Putih",
            reg.targetBelt ? reg.targetBelt.split(' (')[0] : "-"
          ];
        });

        doc.autoTable({
          head: headers,
          body: tableData,
          startY: 42,
          theme: 'grid',
          headStyles: { fillColor: [185, 28, 28], textColor: [255, 255, 255], fontStyle: 'bold' },
          styles: { fontSize: 8.5, cellPadding: 2.5 },
          columnStyles: {
            0: { cellWidth: 10, halign: 'center' },
            4: { fontSize: 8 },
            5: { fontStyle: 'italic' },
            6: { fontStyle: 'bold' }
          }
        });

        // Simpan dokumen PDF
        doc.save(`Data_Peserta_UKT_Musi_Rawas_${new Date().toISOString().split('T')[0]}.pdf`);
        triggerToast("Data Peserta UKT PDF Berhasil Diunduh!");
      };

      const handleUploadUKTData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          const lines = text.split('\n');
          if(lines.length < 2) return;

          let successCount = 0;
          lines.slice(1).forEach((line, index) => {
            if (!line.trim()) return;
            let values = [];
            let inQuotes = false;
            let currentVal = '';
            for (let i = 0; i < line.length; i++) {
              if (line[i] === '"') { inQuotes = !inQuotes; }
              else if (line[i] === ',' && !inQuotes) { values.push(currentVal); currentVal = ''; }
              else { currentVal += line[i]; }
            }
            values.push(currentVal);
            values = values.map(v => v.trim().replace(/"/g, ''));

            const namaAtlet = values[0];
            const targetBelt = values[5];
            const namaEvent = values[6];
            const statusVerif = values[7] === 'LAYAK (DIKONFIRMASI)' ? 'confirmed' : 'pending_confirmation';
            const statusBayar = values[8] === 'LUNAS' ? 'paid' : 'pending';

            const athlete = users.find(u => u.name && u.name.toLowerCase() === (namaAtlet || '').toLowerCase());
            const ev = events.find(e => e.title && e.title.toLowerCase() === (namaEvent || '').toLowerCase());

            if (athlete && ev) {
              const existingReg = registrations.find(r => r.uktEventId === ev.id && r.athleteId === athlete.id);
              if (!existingReg) {
                const cost = ev.fees?.[targetBelt] || 100000;
                addUktReg({
                  id: Date.now() + index,
                  uktEventId: ev.id,
                  athleteId: athlete.id,
                  targetBelt: targetBelt || defaultTargetBelt,
                  cost: cost,
                  status: statusVerif,
                  paymentStatus: statusBayar,
                  raport: null,
                  passStatus: null
                });
                successCount++;
              }
            }
          });
          triggerToast(`${successCount} Data Pendaftaran UKT berhasil dipulihkan dari CSV!`);
        };
        reader.readAsText(file);
      };

      const visibleRegistrations = registrations.filter(reg => {
        const athlete = users.find(u => u.id === reg.athleteId);
        if (!athlete) return false;
        
        // Filter Pencarian
        if (searchQuery && !athlete.name.toLowerCase().includes(searchQuery.toLowerCase())) {
          return false;
        }

        if (user.role === 'super_admin') return true;
        if (user.role === 'pengurus_club') return athlete.club === user.club;
        return false;
      });

      const uktBeltCounts = {};
      beltSequence.forEach(b => uktBeltCounts[b] = 0);
      visibleRegistrations.forEach(reg => {
          if (uktBeltCounts[reg.targetBelt] !== undefined) {
              uktBeltCounts[reg.targetBelt]++;
          }
      });

      const activeUktBelts = beltSequence.filter(b => uktBeltCounts[b] > 0);

      return (
        <div className="space-y-4">
          <div className="flex bg-gray-100 p-1 rounded-xl no-print">
            <button onClick={() => setActiveTab('daftar')} className={`flex-1 py-2 text-[10px] md:text-xs rounded-lg font-bold transition-all duration-200 ${activeTab === 'daftar' ? 'bg-white text-red-700 shadow-sm' : 'text-gray-500'}`}>Pendaftaran</button>
            {(user.role === 'super_admin' || user.role === 'pengurus_club') && (
              <button onClick={() => setActiveTab('kelola')} className={`flex-1 py-2 text-[10px] md:text-xs rounded-lg font-bold transition-all duration-200 ${activeTab === 'kelola' ? 'bg-white text-red-700 shadow-sm' : 'text-gray-500'}`}>Kelola & Nilai</button>
            )}
            {(user.role === 'super_admin' || user.role === 'pengurus_club' || user.role === 'pelatih') && (
              <button onClick={() => setActiveTab('peringkat')} className={`flex-1 py-2 text-[10px] md:text-xs rounded-lg font-bold transition-all duration-200 ${activeTab === 'peringkat' ? 'bg-white text-red-700 shadow-sm' : 'text-gray-500'}`}>Peringkat</button>
            )}
            <button onClick={() => setActiveTab('raport')} className={`flex-1 py-2 text-[10px] md:text-xs rounded-lg font-bold transition-all duration-200 ${activeTab === 'raport' ? 'bg-white text-red-700 shadow-sm' : 'text-gray-500'}`}>Raport UKT</button>
          </div>
          
          {activeTab === 'daftar' && (
            <div className="space-y-4">
              {user.role === 'super_admin' && (
                <button onClick={() => setShowCreateUKT(!showCreateUKT)} className="w-full bg-red-700 hover:bg-red-800 text-white py-2.5 rounded-2xl font-bold text-xs flex justify-center items-center gap-1.5 shadow no-print">
                  <Icon name="Plus" className="w-4 h-4 text-white" /> Buat Event UKT Baru
                </button>
              )}
              
              {showCreateUKT && (
                <form onSubmit={handleCreateUKTSubmit} className="bg-red-50 p-4 rounded-3xl border border-red-100 space-y-3 no-print">
                  <input type="text" placeholder="Judul Kegiatan UKT" value={newTitle} onChange={e => setNewTitle(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl" required />
                  <div className="grid grid-cols-2 gap-2">
                    <select value={newPeriod} onChange={e => setNewPeriod(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl">
                      <option value="Periode I">Periode I</option><option value="Periode II">Periode II</option><option value="Periode III">Periode III</option><option value="Periode IV">Periode IV</option>
                    </select>
                    <input type="date" value={newCloseDate} onChange={e => setNewCloseDate(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl" required />
                  </div>
                  <input type="date" value={newExecDate} onChange={e => setNewExecDate(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl" required />
                
                  <div className="space-y-2 border-t border-red-200 pt-2.5">
                    <label className="block text-[10px] font-bold text-red-900 uppercase tracking-wider pl-1">Atur Biaya UKT Per Sabuk (Rp)</label>
                    <div className="max-h-48 overflow-y-auto space-y-1.5 border border-red-100 p-2 rounded-xl bg-white hide-scrollbar">
                      {beltSequence.map((belt) => (
                        <div key={belt} className="flex justify-between items-center text-xs gap-2 border-b border-gray-50 pb-1 last:border-0 last:pb-0">
                          <span className="truncate text-[10px] font-semibold text-gray-700">{belt}</span>
                          <div className="flex items-center gap-1">
                            <span className="text-[10px] text-gray-400">Rp</span>
                            <input type="number" value={feesSetup[belt] || 0} onChange={e => setFeesSetup({ ...feesSetup, [belt]: Number(e.target.value) })} className="w-20 p-1 border rounded text-right text-xs font-bold focus:ring-1 focus:ring-red-500 focus:outline-none" min="0" required />
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <button type="submit" className="w-full bg-red-700 text-white py-2.5 rounded-xl font-bold text-xs shadow-md">Simpan Event UKT (DB)</button>
                </form>
              )}

              <div className="space-y-3">
                {events.map(ev => { 
                  const myRegistration = registrations.find(r => r.uktEventId === ev.id && r.athleteId === user.id); 
                  const isSuperAdmin = user.role === 'super_admin';

                  if (editingEventId === ev.id) {
                    return (
                      <form key={ev.id} onSubmit={handleSaveEditEvent} className="bg-amber-50/75 p-4 rounded-3xl border border-amber-200 space-y-3 animate-fade-in no-print">
                        <div className="flex justify-between items-center pb-1.5 border-b border-amber-200">
                          <span className="font-bold text-xs text-amber-900 uppercase">Ubah Event UKT</span>
                          <button type="button" onClick={() => setEditingEventId(null)} className="text-gray-400 hover:text-gray-500"><Icon name="XCircle" className="w-5 h-5 text-gray-400" /></button>
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-gray-600 uppercase mb-1">Judul Kegiatan UKT</label>
                          <input type="text" value={editTitle} onChange={e => setEditTitle(e.target.value)} className="w-full text-xs p-2.5 bg-white border border-gray-200 rounded-xl" required />
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                          <div>
                            <label className="block text-[10px] font-bold text-gray-600 uppercase mb-1">Periode</label>
                            <select value={editPeriod} onChange={e => setEditPeriod(e.target.value)} className="w-full text-xs p-2.5 bg-white border border-gray-200 rounded-xl">
                              <option value="Periode I">Periode I</option><option value="Periode II">Periode II</option><option value="Periode III">Periode III</option><option value="Periode IV">Periode IV</option>
                            </select>
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-gray-600 uppercase mb-1">Batas Daftar</label>
                            <input type="date" value={editCloseDate} onChange={e => setEditCloseDate(e.target.value)} className="w-full text-xs p-2.5 bg-white border border-gray-200 rounded-xl" required />
                          </div>
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold text-gray-600 uppercase mb-1">Tanggal Pelaksanaan</label>
                          <input type="date" value={editExecDate} onChange={e => setEditExecDate(e.target.value)} className="w-full text-xs p-2.5 bg-white border border-gray-200 rounded-xl" required />
                        </div>

                        <div className="space-y-2 border-t border-amber-200 pt-2.5">
                          <label className="block text-[10px] font-bold text-amber-950 uppercase tracking-wider pl-1">Biaya UKT Per Sabuk (Rp)</label>
                          <div className="max-h-40 overflow-y-auto space-y-1.5 border border-amber-100 p-2 rounded-xl bg-white hide-scrollbar">
                            {beltSequence.map((belt) => (
                              <div key={belt} className="flex justify-between items-center text-xs gap-2 border-b border-gray-50 pb-1 last:border-0 last:pb-0">
                                <span className="truncate text-[10px] font-semibold text-gray-700">{belt}</span>
                                <div className="flex items-center gap-1">
                                  <span className="text-[10px] text-gray-400">Rp</span>
                                  <input type="number" value={editFees[belt] || 0} onChange={e => setEditFees({ ...editFees, [belt]: Number(e.target.value) })} className="w-20 p-1 border rounded text-right text-[10px] font-bold focus:ring-1 focus:ring-red-500 focus:outline-none" min="0" required />
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>

                        <div className="flex gap-2 pt-2">
                          <button type="submit" className="flex-1 bg-amber-600 hover:bg-amber-700 text-white py-2 rounded-xl font-bold text-xs shadow">Simpan</button>
                          <button type="button" onClick={() => setEditingEventId(null)} className="flex-1 bg-gray-400 hover:bg-gray-500 text-white py-2 rounded-xl font-bold text-xs shadow">Batal</button>
                        </div>
                      </form>
                    );
                  }

                  return (
                    <div key={ev.id} className="bg-white p-4 rounded-3xl border shadow-sm space-y-3 relative">
                      {isSuperAdmin && (
                        <div className="absolute top-3 right-3 flex gap-1.5 z-10 no-print">
                          <button onClick={() => handleStartEditEvent(ev)} className="p-1.5 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-xl transition shadow-sm border border-blue-100" title="Edit Event UKT">
                            <Icon name="Edit" className="w-3.5 h-3.5 text-blue-600" />
                          </button>
                          <button onClick={() => handleDeleteEvent(ev.id)} className="p-1.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl transition shadow-sm border border-red-100" title="Hapus Event UKT">
                            <Icon name="Trash2" className="w-3.5 h-3.5 text-red-600" />
                          </button>
                        </div>
                      )}
                      <h4 className="font-extrabold text-sm text-gray-800 leading-snug pr-16">{ev.title}</h4>
                      <div className="text-[10px] text-gray-400 font-bold uppercase flex gap-1.5 items-center">
                        <Icon name="Calendar" className="w-3.5 h-3.5 text-red-600" />
                        <span>Pelaksanaan: {ev.executionDate || '-'} ({ev.period})</span>
                      </div>
                      <div className="flex justify-between items-center bg-gray-50 p-2.5 rounded-2xl">
                        <span className="text-[10px] text-gray-500 font-bold uppercase">Batas Daftar:</span>
                        <CountdownTimer closeDateString={ev.closeDate} />
                      </div>
                      
                      {user.role === 'atlet' && !myRegistration && (() => {
                        const isRegistrationClosed = new Date() >= new Date(ev.closeDate);
                        return isRegistrationClosed ? (
                          <div className="space-y-3 pt-3 border-t">
                            <div className="bg-red-50 p-3 rounded-xl border border-red-200 text-center">
                              <Icon name="Lock" className="w-5 h-5 text-red-400 mx-auto mb-1" />
                              <span className="text-xs font-black text-red-600 uppercase">Pendaftaran Ditutup</span>
                              <p className="text-[10px] text-red-400 font-bold mt-1">Batas pendaftaran telah berakhir.</p>
                            </div>
                          </div>
                        ) : (
                          <div className="space-y-3 pt-3 border-t">
                            <div className="bg-blue-50 p-3 rounded-xl border border-blue-100 space-y-2 flex justify-between items-center text-xs">
                              <span className="font-bold text-gray-600">Sabuk Sekarang:</span>
                              <span className={getBeltBadgeClass(user.sabuk)}>{user.sabuk || 'Sabuk Putih Polos (Geup 10)'}</span>
                            </div>
                            <div className="bg-green-50 p-3 rounded-xl border border-green-100 space-y-2 flex justify-between items-center text-xs">
                              <span className="font-bold text-green-700">Naik ke Target:</span>
                              <span className={getBeltBadgeClass(defaultTargetBelt)}>{defaultTargetBelt}</span>
                            </div>
                            <div className="bg-red-50 p-3 rounded-xl text-center flex justify-between items-center px-4">
                              <span className="text-[10px] text-red-700 font-bold uppercase">Biaya:</span>
                              <span className="text-sm font-black text-red-800">Rp {(ev.fees?.[defaultTargetBelt] || 0).toLocaleString('id-ID')}</span>
                            </div>
                            <button onClick={() => handleRegister(ev, defaultTargetBelt)} className="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-bold text-xs shadow-md flex items-center justify-center gap-2">
                              <Icon name="ClipboardCheck" className="w-4 h-4 text-white" /> Daftar UKT Sekarang
                            </button>
                          </div>
                        );
                      })()}

                      {myRegistration && (
                        <div className="p-3.5 bg-gray-50 rounded-2xl border border-gray-100 space-y-2 text-xs">
                          <div className="flex justify-between items-center pb-1 border-b">
                            <span>Sabuk Target:</span>
                            <span className={getBeltBadgeClass(myRegistration.targetBelt)}>{myRegistration.targetBelt}</span>
                          </div>
                          <div className="flex justify-between items-center">
                            <span>Status:</span>
                            {myRegistration.status === 'rejected' ? (
                              <span className="font-black text-red-700">DITOLAK</span>
                            ) : (
                              <span className="font-black text-blue-700">{myRegistration.status === 'confirmed' ? 'DIKONFIRMASI' : 'MENUNGGU'}</span>
                            )}
                          </div>
                          {myRegistration.status === 'rejected' && (
                            <div className="text-center mt-2 p-2 bg-red-50 text-red-700 rounded-xl font-bold text-[10px] border border-red-200">
                              Pendaftaran Anda Ditolak oleh Admin. Hubungi pengurus untuk informasi lebih lanjut.
                            </div>
                          )}
                          {myRegistration.status === 'confirmed' && myRegistration.paymentStatus === 'pending' && (
                            <div className="text-center mt-2 p-2 bg-amber-50 text-amber-700 rounded-xl font-bold text-[10px] border border-amber-200">
                              Menunggu Konfirmasi Pembayaran Admin
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          
          {/* TAB KELOLA & NILAI */}
          {activeTab === 'kelola' && (
            <div className="space-y-4">
              <div className="flex flex-col gap-3 bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                <div className="flex justify-between items-center w-full">
                  <span className="text-[11px] font-bold text-gray-700 pl-1 whitespace-nowrap">Total Pendaftar: {visibleRegistrations.length}</span>
                  <div className="flex flex-wrap gap-1.5 justify-end">
                    {/* TOMBOL DOWNLOAD PESERTA PDF */}
                    <button onClick={handleDownloadUKTPDF} className="bg-red-700 hover:bg-red-800 transition text-white px-2.5 py-2 rounded-xl text-[9px] font-bold shadow-sm flex items-center gap-1">
                      <Icon name="FileText" className="w-3.5 h-3.5 text-white" /> Unduh PDF Peserta
                    </button>
                    <button onClick={handleDownloadUKTData} className="bg-blue-600 hover:bg-blue-700 transition text-white px-2.5 py-2 rounded-xl text-[9px] font-bold shadow-sm flex items-center gap-1">
                      <Icon name="Download" className="w-3.5 h-3.5 text-white" /> CSV
                    </button>
                    <label className="bg-emerald-600 hover:bg-emerald-700 cursor-pointer transition text-white px-2.5 py-2 rounded-xl text-[9px] font-bold shadow-sm flex items-center gap-1">
                      <Icon name="Upload" className="w-3.5 h-3.5 text-white" /> Pulihkan
                      <input type="file" accept=".csv" className="hidden" onChange={handleUploadUKTData} />
                    </label>
                  </div>
                </div>
                
                {/* KOLOM PENCARIAN DIPERBESAR */}
                <div className="relative w-full">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <Icon name="Search" className="w-4 h-4 text-gray-400" />
                  </div>
                  <input 
                    type="text" 
                    placeholder="Cari nama peserta UKT..." 
                    value={searchQuery} 
                    onChange={e => setSearchQuery(e.target.value)} 
                    className="w-full text-xs pl-9 p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-red-500 transition" 
                  />
                </div>
              </div>

              {/* STATISTIK SABUK UKT */}
              <div className="bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                  <div className="border-b pb-2 mb-3 flex justify-between items-end">
                      <h3 className="font-extrabold text-xs text-gray-800 uppercase flex items-center gap-1.5">
                          <Icon name="PieChart" className="w-4 h-4 text-red-600" /> Statistik Target Sabuk UKT
                      </h3>
                  </div>
                  {activeUktBelts.length > 0 ? (
                    <div className="grid grid-cols-2 gap-2">
                        {activeUktBelts.map(belt => {
                            const count = uktBeltCounts[belt];
                            return (
                                <div key={belt} className="p-2.5 rounded-xl border border-red-200 bg-red-50/20 shadow-sm flex justify-between items-center transition-all">
                                    <div className="flex items-center gap-1.5 truncate pr-2">
                                        <div className={`w-2 h-2 rounded-full shrink-0 ${getBeltColorDot(belt)}`}></div>
                                        <span className="text-[10px] font-bold text-gray-700 truncate" title={belt}>{belt.split(' (')[0].replace('Sabuk ', '')}</span>
                                    </div>
                                    <span className="text-xs font-black text-red-700 bg-white px-2 py-0.5 rounded-lg border border-red-100">{count}</span>
                                </div>
                            )
                        })}
                    </div>
                  ) : (
                    <p className="text-xs text-center text-gray-400 italic py-4">Belum ada pendaftar UKT aktif.</p>
                  )}
              </div>

              <div className="space-y-3">
                {visibleRegistrations.map(reg => {
                  const athlete = users.find(u => u.id === reg.athleteId);
                  const event = events.find(e => e.id === reg.uktEventId);
                  if (!athlete || !event) return null;
                  
                  return (
                    <div key={reg.id} className="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm space-y-2">
                      <div className="flex justify-between items-start mb-2">
                        <div>
                          <h4 className="font-extrabold text-sm text-gray-800">{athlete.name}</h4>
                          <p className="text-[10px] font-bold text-gray-500 mt-0.5">{event.title} ({athlete.club})</p>
                        </div>
                        <span className={getBeltBadgeClass(reg.targetBelt)}>{reg.targetBelt}</span>
                      </div>
                      
                      <div className="grid grid-cols-2 gap-2 mt-3 text-xs">
                        <div className="bg-gray-50 p-2 rounded-xl flex flex-col">
                          <span className="text-[9px] text-gray-500 font-bold">Status Data</span>
                          <span className={`font-black ${reg.status === 'confirmed' ? 'text-green-600' : reg.status === 'rejected' ? 'text-red-600' : 'text-orange-500'}`}>
                            {reg.status === 'confirmed' ? 'LAYAK' : reg.status === 'rejected' ? 'DITOLAK' : 'MENUNGGU'}
                          </span>
                        </div>
                        <div className="bg-gray-50 p-2 rounded-xl flex flex-col">

                              <span className="text-[8px] text-gray-400 italic font-medium">{getScorePredicate(scoreTangkisan)}</span>

                                  <label className="block font-bold text-gray-500 mb-0.5">TTD (Unggah)</label>

                                  {examinerSignature && <div className="mt-2 flex justify-center bg-gray-50 p-1 rounded border"><img src={examinerSignature} className="h-10 object-contain" alt="TTD Penguji" /></div>}

                          <textarea placeholder="Catatan Penguji..." value={examinerNotes} onChange={e => setExaminerNotes(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl mt-3" />

                {visibleRegistrations.length === 0 && (

          {/* TAB PERINGKAT NILAI (KHUSUS ADMIN) */}
          {activeTab === 'peringkat' && (
            <div className="space-y-4 animate-fade-in">
              <div className="bg-white p-4 rounded-3xl border shadow-sm flex flex-col gap-3">
                 <div className="flex justify-between items-center border-b pb-2">
                   <h3 className="font-extrabold text-sm text-gray-800 flex items-center gap-1.5"><Icon name="Trophy" className="w-5 h-5 text-yellow-500" /> Peringkat Nilai UKT Tertinggi</h3>
                   <button onClick={handleDownloadPeringkatPDF} className="bg-red-700 hover:bg-red-800 text-white px-3 py-1.5 rounded-xl text-[10px] font-bold flex items-center gap-1.5 shadow-sm transition">
                     <Icon name="Download" className="w-3.5 h-3.5 text-white" /> Unduh PDF
                   </button>
                 </div>
                 <div className="grid grid-cols-4 gap-1 text-center text-[10px] font-bold no-print">
                    {['Periode I', 'Periode II', 'Periode III', 'Periode IV'].map(p => (
                      <button key={p} onClick={() => setPeringkatPeriod(p)} className={`p-2 rounded-xl transition border ${peringkatPeriod === p ? 'bg-red-700 text-white border-red-700 shadow-sm' : 'bg-white text-gray-500 border-gray-200'}`}>{p}</button>
                    ))}
                 </div>
              </div>

              {(() => {
                 // 1. Ambil raport sesuai periode
                 const eligibleRaports = historicalRaports.filter(r => r.period === peringkatPeriod);
                 
                 // 2. Gabungkan dengan data Atlet & Filter Sesuai Hak Akses Admin
                 const enrichedRaports = eligibleRaports.map(r => {
                   const athlete = users.find(u => u.id === r.athleteId);
                   return { ...r, athlete };
                 }).filter(r => {
                   if (!r.athlete) return false;
                   if (user.role === 'super_admin') return true;
                   if (user.role === 'pengurus_club' || user.role === 'pelatih') return r.athlete.club === user.club;
                   return false;
                 });

                 if (enrichedRaports.length === 0) {
                    return <div className="text-center text-gray-400 text-xs py-8 italic bg-white rounded-3xl border shadow-sm">Belum ada data nilai UKT pada periode ini.</div>;
                 }

                 // 3. Kelompokkan berdasarkan Sabuk Tujuan
                 const grouped = {};
                 enrichedRaports.forEach(r => {
                   if (!grouped[r.targetBelt]) grouped[r.targetBelt] = [];
                   grouped[r.targetBelt].push(r);
                 });

                 // 4. Urutkan kelompok sabuk sesuai urutan aslinya
                 const activeBelts = beltSequence.filter(b => grouped[b] && grouped[b].length > 0);

                 return activeBelts.map(belt => {
                   // Urutkan atlet berdasarkan Total Skor Tertinggi
                   const sorted = grouped[belt].sort((a, b) => b.raport.totalScore - a.raport.totalScore);
                   
                   return (
                     <div key={belt} className="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm space-y-3">
                       <div className="flex justify-between items-center pb-2 border-b">
                         <div className="flex items-center gap-2 pr-2">
                           <div className={`w-3 h-3 rounded-full shrink-0 ${getBeltColorDot(belt)}`}></div>
                           <span className="font-bold text-xs md:text-sm text-gray-800 leading-tight">{belt}</span>
                         </div>
                         <span className="text-[9px] md:text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded-md shrink-0">{sorted.length} Orang</span>
                       </div>
                       
                       <div className="space-y-2">
                         {sorted.map((r, idx) => (
                           <div key={r.id} className="flex justify-between items-center p-2.5 bg-gray-50 rounded-xl border border-gray-100 hover:bg-gray-100 transition">
                             <div className="flex items-center gap-2 md:gap-3 flex-1 min-w-0 pr-2">
                               <div className={`w-6 h-6 shrink-0 rounded-full flex items-center justify-center text-[10px] font-black ${idx === 0 ? 'bg-yellow-100 text-yellow-700 border border-yellow-300' : idx === 1 ? 'bg-gray-200 text-gray-600 border border-gray-400' : idx === 2 ? 'bg-orange-100 text-orange-700 border border-orange-300' : 'bg-white text-gray-400 border'}`}>
                                 {idx + 1}
                               </div>
                               <div className="min-w-0">
                                 <div className="font-bold text-xs text-gray-800 truncate">{r.athlete.name}</div>
                                 <div className="text-[9px] text-gray-500 font-semibold truncate">{r.athlete.club}</div>
                               </div>
                             </div>
                             <div className="flex flex-col items-end shrink-0">
                               <span className="font-black text-sm text-red-700 leading-none">{r.raport.totalScore}</span>
                               <span className={`text-[8px] font-bold uppercase mt-1 px-1.5 py-0.5 rounded ${r.passStatus === 'Lulus' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{r.passStatus}</span>
                             </div>
                           </div>
                         ))}

              })()}
            </div>
          )}

          {activeTab === 'raport' && <RaportView user={user} users={users} historicalRaports={historicalRaports} triggerToast={triggerToast} addRaport={addRaport} updateRaport={updateRaport} deleteRaport={deleteRaport} />}
        </div>
      );
    }

    function RaportView({ user, users, historicalRaports, triggerToast, addRaport, updateRaport, deleteRaport }) {
      const [selectedAthleteId, setSelectedAthleteId] = useState(user.role === 'atlet' ? user.id : ''); const [activePeriodTab, setActivePeriodTab] = useState('Periode I');
      const [editingRaportId, setEditingRaportId] = useState(null);
      const [editRaportData, setEditRaportData] = useState(null);
      const athletes = users.filter(u => u.role === 'atlet' && (user.role === 'super_admin' || u.club === user.club)); const activeAthlete = users.find(u => u.id === Number(selectedAthleteId)); const activePeriodRaport = historicalRaports.find(r => r.athleteId === Number(selectedAthleteId) && r.period === activePeriodTab);

      const components = [
        { key: 'pukulan', label: 'Pukulan (Jireugi)' },
        { key: 'tangkisan', label: 'Tangkisan (Makki)' },
        { key: 'tendangan', label: 'Tendangan (Chagi)' },
        { key: 'kudaKuda', label: 'Sikap Kuda-Kuda (Seogi)' },
        { key: 'taegeuk', label: 'Jurus (Taegeuk / Poomsae)' },
        { key: 'kyorugi', label: 'Pertarungan (Kyorugi)' },
        { key: 'fisik', label: 'Kekuatan Fisik & Stamina' },
        { key: 'pengetahuan', label: 'Pengetahuan Umum Taekwondo' },
        { key: 'kyukpa', label: 'Pemecahan Papan (Kyukpa)' },
        { key: 'mental', label: 'Kerapian & Mental Spiritual (Attitude)' }
      ];

      // --- Fitur Edit & Hapus Raport (Khusus Super Admin) ---
      const handleStartEditRaport = (raport) => {
        setEditingRaportId(raport.id);
        setEditRaportData({ ...raport.raport });
      };

      const handleCancelEdit = () => {
        setEditingRaportId(null);
        setEditRaportData(null);
      };

      const handleSaveEditRaport = () => {
        if (!editRaportData || !editingRaportId) return;
        const raportToUpdate = historicalRaports.find(r => r.id === editingRaportId);
        if (!raportToUpdate) return;
        
        // Recalculate total score
        const totalScore = components.reduce((sum, comp) => sum + (Number(editRaportData[comp.key]) || 0), 0);
        const passStatus = totalScore >= 60 ? 'Lulus' : 'Tidak Lulus';
        
        const updatedRaport = {
          ...raportToUpdate,
          raport: { ...editRaportData, totalScore },
          passStatus
        };
        
        if (updateRaport) {
          updateRaport(editingRaportId, updatedRaport);
          triggerToast("Raport berhasil diperbarui!");
        }
        setEditingRaportId(null);
        setEditRaportData(null);
      };

      const handleDeleteRaport = (raportId) => {
        if (!window.confirm("Hapus raport ini secara permanen? Tindakan ini tidak dapat dibatalkan!")) return;
        if (deleteRaport) {
          deleteRaport(raportId);
          triggerToast("Raport berhasil dihapus!");
        }
      };

      // FUNGSI BACKUP DAN RESTORE KHUSUS DATA RAPORT (JSON)
      const clubFilteredRaports = user.role === 'super_admin' ? historicalRaports : historicalRaports.filter(r => { const a = users.find(u => u.id === r.athleteId); return a && a.club === user.club; });
      const handleDownloadRaportBackup = () => {
        if(clubFilteredRaports.length === 0) {
            triggerToast("Belum ada data raport untuk diunduh.", "error");
            return;
        }
        const blob = new Blob([JSON.stringify(clubFilteredRaports, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `Backup_Raport_UKT_${user.club}_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        triggerToast("Backup data Raport UKT berhasil diunduh!", "success");
      };

      const handleUploadRaportBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            if(Array.isArray(parsed)) {
                let successCount = 0;
                parsed.forEach(r => {
                    const exists = historicalRaports.find(ext => ext.id === r.id);
                    if(!exists) {
                        addRaport(r);
                        successCount++;
                    }
                });
                triggerToast(`${successCount} data raport berhasil dipulihkan ke Database!`, "success");
            } else {
                triggerToast("Format file tidak valid. Harap unggah file JSON Backup Raport.", "error");
            }
          } catch(err) {
            triggerToast("Gagal membaca file JSON.", "error");
          }
        };
        reader.readAsText(file);
      };

      return (
        <div className="space-y-4">
          {/* PANEL KONTROL BACKUP KHUSUS RAPORT (ADMIN ONLY) */}
          {(user.role === 'super_admin' || user.role === 'pengurus_club') && (
              <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center no-print">
                  <span className="text-[10px] font-bold text-gray-500 uppercase flex items-center gap-1"><Icon name="Database" className="w-3.5 h-3.5"/> Arsip Raport ({clubFilteredRaports.length})</span>
                  <div className="flex gap-1.5">
                      <button onClick={handleDownloadRaportBackup} className="bg-indigo-600 hover:bg-indigo-700 text-white px-2.5 py-1.5 rounded-lg text-[9px] font-bold flex items-center gap-1 shadow-sm transition">
                          <Icon name="DownloadCloud" className="w-3.5 h-3.5 text-white" /> Unduh (JSON)
                      </button>
                      <label className="bg-teal-600 hover:bg-teal-700 cursor-pointer text-white px-2.5 py-1.5 rounded-lg text-[9px] font-bold flex items-center gap-1 shadow-sm transition">
                          <Icon name="UploadCloud" className="w-3.5 h-3.5 text-white" /> Pulihkan
                          <input type="file" accept=".json" className="hidden" onChange={handleUploadRaportBackup} />
                      </label>
                  </div>
              </div>
          )}

          {user.role !== 'atlet' && (
            <div className="bg-white p-3.5 rounded-3xl border shadow-sm space-y-2.5 no-print">
              <label className="block text-[11px] font-bold text-gray-500 uppercase tracking-wider">Cari Atlet:</label>
              <select value={selectedAthleteId} onChange={e => setSelectedAthleteId(e.target.value)} className="w-full text-xs p-2.5 bg-gray-50 border rounded-xl">
                <option value="">-- Pilih --</option>
                {athletes.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
            </div>
          )}
          
          {selectedAthleteId ? (
            <div className="space-y-4 animate-fade-in">
              {activeAthlete && (
                <div className="bg-red-50 p-4 rounded-3xl border flex justify-between items-center text-xs no-print">
                  <h4 className="font-extrabold text-sm text-red-900">{activeAthlete.name}</h4>
                  <span className={getBeltBadgeClass(activeAthlete.sabuk)}>{activeAthlete.sabuk}</span>
                </div>

                      <div className="border border-gray-100 rounded-2xl overflow-hidden shadow-sm print:border-gray-300 print:shadow-none">
                        <table className="w-full text-left border-collapse text-xs">
                          <thead>
                            <tr className="bg-red-50 text-red-900 border-b border-gray-100 font-extrabold print:bg-gray-100 print:text-black print:border-gray-300">
                              <th className="p-3 w-10 text-center">No</th>

                            {components.map((comp, idx) => {

                              return (

                        <span className={`text-xs font-black uppercase tracking-wider mt-1 px-3 py-1 rounded-full ${activePeriodRaport.passStatus === 'Lulus' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'} print:text-black print:bg-transparent print:border-none`}>
                          {activePeriodRaport.passStatus}

                    </div>

                    {/* Catatan Penguji */}
                    {activePeriodRaport.raport.notes && (

    }

    function ChampionshipView({ user, events, addChamp, updateChamp, deleteChamp, registrations, addChampReg, updateChampReg, triggerToast, users, points, addPoint }) {
      const [showAddForm, setShowAddForm] = useState(false); 
      const [title, setTitle] = useState(''); 
      const [level, setLevel] = useState('Kabupaten'); 
      const [date, setDate] = useState(''); 
      const [dateEnd, setDateEnd] = useState(''); 
      const [regDeadline, setRegDeadline] = useState(''); 
      const [cost, setCost] = useState(''); 
      const [selectedClassCategory, setSelectedClassCategory] = useState('Kyorugi (Prestasi)');
      const [eventType, setEventType] = useState('Kejuaraan');
      
      const [editingChampId, setEditingChampId] = useState(null);
      const [editChampData, setEditChampData] = useState({});

      const handleSubmit = (e) => { 
        e.preventDefault(); 
        addChamp({ id: Date.now(), title, type: eventType, level, date, dateEnd: dateEnd || date, regDeadline: regDeadline || date, cost: Number(cost), isOpen: true }); 
        setTitle(''); setDate(''); setDateEnd(''); setRegDeadline(''); setCost(''); setShowAddForm(false); triggerToast("Event ditambahkan (DB)!"); 
      };
      
      const handleStartEdit = (ev) => { setEditingChampId(ev.id); setEditChampData(ev); };
      const handleSaveEdit = (e) => { 
          e.preventDefault(); 
          updateChamp(editingChampId, { ...editChampData, cost: Number(editChampData.cost) }); 
          setEditingChampId(null); 
          triggerToast("Data event diperbarui!"); 
      };
      const handleDelete = (id) => { 
          if(window.confirm("Yakin hapus event ini secara permanen?")) { 
              deleteChamp(id); 
              triggerToast("Event dihapus!"); 
          } 
      };

      const handleRegisterEvent = (event) => { 
        if (registrations.find(r => r.champId === event.id && r.athleteId === user.id)) { 
          triggerToast("Sudah terdaftar.", "error"); return; 
        }
        const deadline = new Date(event.regDeadline || event.date);
        deadline.setHours(23, 59, 59, 999);
        if (new Date() > deadline) {
          triggerToast("Pendaftaran sudah ditutup! Batas pendaftaran: " + (event.regDeadline || event.date), "error"); return;
        } 
        addChampReg({ id: Date.now(), champId: event.id, athleteId: user.id, classCategory: selectedClassCategory, cost: event.cost, paymentStatus: 'pending' });
        // Auto poin untuk mengikuti event
        const eventType = event.type || 'Kejuaraan';
        const eventCategory = eventType === 'Kejuaraan' ? 'Event Kejuaraan' : eventType === 'Latihan Gabungan' ? 'Event LatGab' : 'Event Kegiatan Lain';
        const champPointMap = { 'Kabupaten': 1, 'Provinsi': 2, 'Nasional': 3 };
        const autoPoints = champPointMap[event.level] || 1;
        const existingChampPoint = points?.find(p => p.athleteId === user.id && p.eventName === event.title && p.category === eventCategory);
        if (!existingChampPoint && addPoint) {
          addPoint({ id: Date.now() + 1, athleteId: user.id, eventName: event.title, level: event.level, category: eventCategory, division: selectedClassCategory, achievement: 'Mengikuti Event', points: autoPoints });
        }
        triggerToast(`Berhasil mendaftar! +${autoPoints} Poin otomatis untuk mengikuti event ${event.level}.`); 
      };
      
      const handlePayEvent = (regId) => { 
        const target = registrations.find(r=>r.id===regId); 
        updateChampReg(regId, { ...target, paymentStatus: 'paid' }); 
        triggerToast("Pembayaran dikonfirmasi!"); 
      };

      const handleDownloadEventPDF = (event) => {
        const eventRegs = registrations.filter(r => r.champId === event.id);
        if (eventRegs.length === 0) {
            triggerToast("Belum ada peserta yang mendaftar event ini.", "error");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.setTextColor(185, 28, 28);
        doc.text("DAFTAR PESERTA EVENT TAEKWONDO", 105, 15, { align: "center" });
        
        doc.setFontSize(11);
        doc.setTextColor(30, 41, 59);
        doc.text(event.title.toUpperCase(), 105, 22, { align: "center" });
        
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        doc.text(`Kategori: ${event.type} | Tanggal: ${event.date}${event.dateEnd && event.dateEnd !== event.date ? ` s/d ${event.dateEnd}` : ''} | Tingkat: ${event.level}`, 105, 28, { align: "center" });
        if (event.regDeadline) {
          doc.setFontSize(8);
          doc.setTextColor(220, 38, 38);
          doc.text(`Batas Pendaftaran: ${event.regDeadline}`, 105, 33, { align: "center" });
        }

        const headers = [["No", "Nama Atlet", "Dojang / Club", "Kategori Kelas", "Status Pembayaran"]];
        const tableData = eventRegs.map((reg, index) => {
            const athlete = users.find(u => u.id === reg.athleteId);
            return [
                index + 1,
                athlete?.name || "-",
                athlete?.club || "-",
                reg.classCategory || "-",
                reg.paymentStatus === 'paid' ? "LUNAS" : "PENDING"
            ];
        });

        doc.autoTable({
            head: headers,
            body: tableData,
            startY: event.regDeadline ? 40 : 35,
            theme: 'grid',
            headStyles: { fillColor: [185, 28, 28], textColor: [255, 255, 255] },
            styles: { fontSize: 8.5, cellPadding: 2.5 },
            columnStyles: { 0: { cellWidth: 10, halign: 'center' } }
        });

        doc.save(`Daftar_Peserta_${event.title.replace(/\s+/g, '_')}.pdf`);
        triggerToast("PDF Peserta Event Berhasil Diunduh!");
      };
      
      return (
        <div className="space-y-4">
          <div className="flex items-center gap-2 border-b pb-2"><Icon name="Award" className="w-5 h-5 text-red-600" /><h2 className="text-lg font-black text-gray-800">Manajemen Event</h2></div>
          {user.role === 'super_admin' && <button onClick={() => setShowAddForm(!showAddForm)} className="w-full bg-red-50 text-red-700 py-2.5 rounded-xl font-bold text-xs flex justify-center items-center gap-1.5 border border-red-200"><Icon name="Plus" className="w-4 h-4 text-red-600" /> {showAddForm ? 'Batal' : 'Buat Event Baru'}</button>}
          {showAddForm && (
            <form onSubmit={handleSubmit} className="bg-red-50/70 p-4 rounded-3xl border space-y-3">
              <input type="text" placeholder="Nama Event" value={title} onChange={e => setTitle(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl" required />
              <div className="grid grid-cols-2 gap-2">
                <select value={eventType} onChange={e => setEventType(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl"><option value="Kejuaraan">Kejuaraan</option><option value="Latihan Gabungan">Latihan Gabungan</option><option value="Diklat">Diklat</option><option value="Lainnya">Lainnya</option></select>
                <select value={level} onChange={e => setLevel(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl"><option value="Kabupaten">Kabupaten</option><option value="Provinsi">Provinsi</option><option value="Nasional">Nasional</option></select>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <label className="text-[10px] font-bold text-gray-500 mb-1 block">Tanggal Mulai</label>
                  <input type="date" value={date} onChange={e => { setDate(e.target.value); if (!dateEnd || dateEnd < e.target.value) setDateEnd(e.target.value); if (!regDeadline || regDeadline > e.target.value) setRegDeadline(''); }} className="w-full text-xs p-2.5 bg-white border rounded-xl" required />
                </div>
                <div>
                  <label className="text-[10px] font-bold text-gray-500 mb-1 block">Tanggal Selesai</label>
                  <input type="date" value={dateEnd || date} min={date} onChange={e => setDateEnd(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl" required />
                </div>
              </div>
              <div>
                <label className="text-[10px] font-bold text-red-600 mb-1 block">Batas Pendaftaran</label>
                <input type="date" value={regDeadline} max={date} onChange={e => setRegDeadline(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl border-red-200" required />
              </div>
              {date && (dateEnd || date) && (() => { const d1 = new Date(date); const d2 = new Date(dateEnd || date); const diff = Math.ceil((d2 - d1) / (1000*60*60*24)) + 1; return diff > 0 ? <div className="bg-blue-50 text-blue-700 px-3 py-2 rounded-xl text-[10px] font-bold text-center border border-blue-100">Durasi Kegiatan: <span className="text-sm font-black">{diff} Hari</span> ({date} s/d {dateEnd || date}){regDeadline ? ` | Daftar s/d ${regDeadline}` : ''}</div> : null; })()}
              <input type="number" placeholder="Biaya Pendaftaran (Rp)" value={cost} onChange={e => setCost(e.target.value)} className="w-full text-xs p-2.5 bg-white border rounded-xl" required />
              <button type="submit" className="w-full bg-red-700 text-white py-2.5 rounded-xl font-bold text-xs shadow">Publish Event ke DB</button>
            </form>
          )}
          <div className="space-y-3">
            {events.map(ev => { 
              const myReg = registrations.find(r => r.champId === ev.id && r.athleteId === user.id); 
              return (
                <div key={ev.id} className="bg-white p-4 rounded-3xl border shadow-sm relative">
                  {editingChampId === ev.id ? (
                     <form onSubmit={handleSaveEdit} className="space-y-2">
                        <input type="text" value={editChampData.title} onChange={e => setEditChampData({...editChampData, title: e.target.value})} className="w-full text-xs p-2 border rounded-xl" required />

      const getAutomaticPoints = (cat, div, mdl, lvl) => {

          if (lvl === 'Kabupaten') return 1;
          if (lvl === 'Provinsi') return 2;
          if (lvl === 'Nasional') return 3;
        }

        if (mdl === 'Partisipasi') {
          if (lvl === 'Kabupaten') return 1;
          if (lvl === 'Provinsi') return 2;
          if (lvl === 'Nasional') return 3;
        }

        if (div === 'Pemula') {
          if (mdl === 'Emas') return lvl === 'Kabupaten' ? 1 : lvl === 'Provinsi' ? 2 : 3;
          if (mdl === 'Perak') return lvl === 'Kabupaten' ? 0 : lvl === 'Provinsi' ? 1 : 2;
          if (mdl === 'Perunggu') return lvl === 'Kabupaten' ? 0 : lvl === 'Provinsi' ? 1 : 2;

        if (div === 'Prestasi') {
          if (mdl === 'Emas') return lvl === 'Kabupaten' ? 3 : lvl === 'Provinsi' ? 4 : 5;
          if (mdl === 'Perak') return lvl === 'Kabupaten' ? 2 : lvl === 'Provinsi' ? 3 : 4;

        }

        addPoint({
