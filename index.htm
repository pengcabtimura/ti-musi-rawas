                            Unduh PDF Kategori &ldquo;{leaderboardFilter === 'Event Kejuaraan' ? 'Event' : leaderboardFilter === 'Event LatGab' ? 'LatGab' : leaderboardFilter === 'Event Kegiatan Lain' ? 'Lainnya' : leaderboardFilter}&rdquo;
                          </button>
                          <button
                            onClick={handleDownloadAllCategoriesPDF}
                            className="bg-amber-700 hover:bg-amber-800 active:scale-[0.98] text-white py-2.5 px-3 rounded-xl text-[10px] font-bold shadow-sm flex items-center justify-center gap-1.5 transition"
                            title="Unduh rekap gabungan seluruh kategori dalam satu PDF"
                          >
                            <Icon name="FileText" className="w-3.5 h-3.5" />
                            Unduh Semua Kategori (PDF)
                          </button>
                        </div>
                      </div>
                    )}
                    {/* ===== END BLOK REKAP PDF ===== */}

                    <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                       <div className="bg-red-50 p-3 font-extrabold text-xs text-red-800 uppercase flex justify-between"><span>Ranking</span><span>Poin & Riwayat</span></div>
                       <div className="divide-y divide-gray-100">
                          {searchedAthletes.map((atlet, index) => (
                             <div key={atlet.id} className="p-3 flex justify-between items-center hover:bg-gray-50 transition">
                                <div className="flex items-center gap-3 pr-2 min-w-0">
                                   <span className={`font-black text-sm w-5 shrink-0 text-center ${index === 0 ? 'text-yellow-500' : 'text-gray-400'}`}>{index + 1}</span>
                                   <div className="min-w-0">
                                      <div className="font-extrabold text-sm text-gray-800 truncate">{atlet.name}</div>
                                      <div className="text-[10px] text-gray-500 font-medium mt-0.5 truncate"><span className={getBeltBadgeClass(atlet.sabuk)}>{atlet.sabuk}</span></div>
                                   </div>
                                </div>
                                <div className="flex flex-col items-end gap-1.5 shrink-0">
                                   <div className="font-black text-red-700 bg-red-50 px-2 py-0.5 rounded-lg text-xs border border-red-100 shadow-sm">{calculateTotal(atlet.id, leaderboardFilter)} POIN</div>
                                   <button onClick={() => setViewingHistoryAthleteId(atlet.id)} className="text-[9px] font-bold text-white bg-blue-600 hover:bg-blue-700 px-2 py-1 rounded shadow-sm transition flex items-center gap-1">
                                      <Icon name="List" className="w-3 h-3"/> Riwayat
                                   </button>
                                </div>
                             </div>
                          ))}
                       </div>
                    </div>
                 </>
              )}
            </div>
          )}
        </div>
      );
    }

    function AccountManager({ user, users, addUser, updateUser, deleteUser, clubs, addClub, deleteClub, triggerToast, featureSettings, updateFeatureSettings }) {
      const [managerTab, setManagerTab] = useState('pengguna'); const [showAddAccount, setShowAddAccount] = useState(false); const [editingUserId, setEditingUserId] = useState(null);
      const [ktaUser, setKtaUser] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [license, setLicense] = useState(''); 
      
      const [newClubName, setNewClubName] = useState('');
      const [editingClubIndex, setEditingClubIndex] = useState(null);
      const [editClubNameValue, setEditClubNameValue] = useState('');
      
      // State variabel untuk form tambah/edit akun
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [role, setRole] = useState('atlet');
      const [club, setClub] = useState(user.role === 'super_admin' ? (clubs[0] || 'Pusat Mura') : user.club);
      const [sabuk, setSabuk] = useState('Sabuk Putih Polos (Geup 10)');
      const [gender, setGender] = useState('Laki-laki');
      const [placeOfBirth, setPlaceOfBirth] = useState('');
      const [dateOfBirth, setDateOfBirth] = useState('');
      const [regNo, setRegNo] = useState('');

      const isSabukVisible = role === 'atlet' || role === 'pelatih';

      const visibleUsers = users.filter(u => {
        const matchRoleClub = user.role === 'super_admin' || u.club === user.club;
        const matchSearch = u.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                            (u.regNo && u.regNo.toLowerCase().includes(searchQuery.toLowerCase()));
        return matchRoleClub && matchSearch;
      });

      // --- LOGIKA STATISTIK SABUK (MENGHITUNG SELURUH DATA, TIDAK TERPENGARUH PENCARIAN) ---
      const baseStatUsers = users.filter(u => user.role === 'super_admin' || u.club === user.club);
      const beltStats = {};
      beltSequence.forEach(b => beltStats[b] = 0);
      baseStatUsers.forEach(u => {
         if ((u.role === 'atlet' || u.role === 'pelatih') && u.sabuk && beltStats[u.sabuk] !== undefined) {
             beltStats[u.sabuk]++;
         }
      });
      const activeBelts = beltSequence.filter(b => beltStats[b] > 0);
      // -------------------------------

      const handleStartEdit = (targetUser) => { 
        setEditingUserId(targetUser.id); 
        setUsername(targetUser.username || ''); 
        setPassword(targetUser.password || ''); 
        setName(targetUser.name); 
        setEmail(targetUser.email); 
        setRole(targetUser.role); 
        setClub(targetUser.club || user.club); 
        setSabuk(targetUser.sabuk || 'Sabuk Putih Polos (Geup 10)'); 
        setGender(targetUser.gender || 'Laki-laki'); 
        setPlaceOfBirth(targetUser.placeOfBirth || ''); 
        setDateOfBirth(targetUser.dateOfBirth || ''); 
        setRegNo(targetUser.regNo || ''); 
        setLicense(targetUser.license || ''); 
        setShowAddAccount(false); // Sembunyikan form tambah di atas agar fokus ke edit inline
      };

      const handleCancelEdit = () => { 
        setEditingUserId(null); setUsername(''); setPassword(''); setName(''); setEmail(''); setRole('atlet'); setClub(user.role === 'super_admin' ? (clubs[0] || 'Pusat Mura') : user.club); setSabuk('Sabuk Putih Polos (Geup 10)'); setGender('Laki-laki'); setPlaceOfBirth(''); setDateOfBirth(''); setRegNo(''); setLicense(''); setShowAddAccount(false); 
      };

      const handleDelete = (id) => { if (window.confirm('Hapus akun ini dari Database?')) { deleteUser(id); triggerToast("Akun terhapus dari Database."); } };
      
      const handleAddAccountSubmit = (e) => {
        e.preventDefault(); 
        if (!name.trim() || !username.trim() || !password.trim()) { triggerToast("Lengkapi form!", "error"); return; }
        let finalRegNo = regNo.trim(); 
        if ((role === 'atlet' || role === 'pelatih') && !finalRegNo) {
          finalRegNo = 'REG-' + Math.floor(1000000000 + Math.random() * 9000000000); 
        } else if (role !== 'atlet' && role !== 'pelatih') {
          finalRegNo = '';
        }
        
        const licenseValue = role === 'pelatih' ? license.trim() : '';
        const assignedClub = user.role === 'super_admin' ? club : user.club; 

        if (editingUserId) { 
          const existing = users.find(u => u.id === editingUserId);
          updateUser(editingUserId, { 
            ...existing, username, password, name, email, role, club: assignedClub, gender, 
            placeOfBirth: placeOfBirth || 'Musi Rawas', dateOfBirth: dateOfBirth || '2010-01-01', 
            regNo: finalRegNo, sabuk: isSabukVisible ? sabuk : null, license: licenseValue 
          }); 
          triggerToast(`Profil & Status ${name} diperbarui ke DB!`); 
        } else { 
          addUser({ 
            id: Date.now(), username, password, name, email, role, club: assignedClub, gender, 
            placeOfBirth: placeOfBirth || 'Musi Rawas', dateOfBirth: dateOfBirth || '2010-01-01', 
            regNo: finalRegNo, sabuk: isSabukVisible ? sabuk : null, license: licenseValue,
            status: 'Aktif', suspendedUntil: null, avatar: '' 
          }); 
          triggerToast(`Akun ${name} (${role}) tersimpan di DB!`); 
        }
        handleCancelEdit();
      };

      const handleAddClub = (e) => { e.preventDefault(); if (!newClubName.trim() || clubs.includes(newClubName.trim())) { triggerToast("Nama club tidak valid atau sudah ada.", "error"); return; } addClub({ id: newClubName.trim(), name: newClubName.trim() }); setNewClubName(''); triggerToast("Club masuk DB!"); };
      const handleDeleteClub = (index) => { if (window.confirm("Hapus club dari Database?")) { deleteClub(clubs[index]); triggerToast("Club dihapus dari DB."); } };
      
      const handleEditClubStart = (index, currentName) => { setEditingClubIndex(index); setEditClubNameValue(currentName); };
      const handleEditClubSave = (e, index) => { 
        e.preventDefault(); 
        const newName = editClubNameValue.trim(); 
        if (!newName || (clubs.includes(newName) && clubs[index] !== newName)) { triggerToast("Nama club tidak valid atau sudah ada.", "error"); return; } 
        const oldName = clubs[index]; 
        
        deleteClub(oldName);
        addClub({ id: newName, name: newName });
        
        users.forEach(u => {
          if (u.club === oldName) updateUser(u.id, { ...u, club: newName });
        });
        
        setEditingClubIndex(null); triggerToast("Data Club dan Anggota berhasil tersinkron ke DB!"); 
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          const lines = text.split('\n');
          if(lines.length < 2) return;
          
          const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
          let successCount = 0;
          
          lines.slice(1).forEach((line, index) => {
            if (!line.trim()) return;
            let values = [];
            let inQuotes = false;
            let currentVal = '';
            for (let i = 0; i < line.length; i++) {
              if (line[i] === '"') { inQuotes = !inQuotes; }
              else if (line[i] === ',' && !inQuotes) { values.push(currentVal); currentVal = ''; }
              else { currentVal += line[i]; }
            }
            values.push(currentVal);
            values = values.map(v => v.trim().replace(/"/g, ''));
            
            let newUser = { id: Date.now() + index, avatar: '', status: 'Aktif', suspendedUntil: null };
            
            headers.forEach((header, i) => {
               let val = values[i] || '';
               if (val.toLowerCase() === 'null') val = null;
               if (header === 'gender' && val) {
                  val = val.toUpperCase().includes('PEREMPUAN') ? 'Perempuan' : 'Laki-laki';
               }
               if (header === 'sabuk' && val) {
                  if(val.toUpperCase().includes('PUTIH')) val = 'Sabuk Putih Polos (Geup 10)';
                  else if(val.toUpperCase().includes('KUNING POLOS')) val = 'Sabuk Kuning Polos (Geup 9)';
               }
               newUser[header] = val;
            });
            
            if (user.role !== 'super_admin') {
              newUser.club = user.club; 
              if (newUser.role === 'super_admin' || newUser.role === 'pengurus_club') {
                newUser.role = 'atlet'; 
              }
            }
            
            if (newUser.username && !users.find(u => u.username === newUser.username)) {
              addUser(newUser);
              successCount++;
            }
          });
          triggerToast(`${successCount} Akun berhasil diimpor dari CSV ke Database!`);
        };
        reader.readAsText(file);
      };

      const handleDownloadCSV = () => {
        const headers = ['ID', 'Nama Lengkap', 'Username', 'Email', 'Peran', 'Dojang', 'Sabuk', 'Jenis Kelamin', 'Tempat Lahir', 'Tanggal Lahir', 'No. Registrasi', 'Lisensi Pelatih', 'Status Akun', 'Batas Blokir Sanksi'];
        
        const rows = visibleUsers.map(u => [
          u.id, 
          `"${(u.name || '').replace(/"/g, '""')}"`, 
          `"${(u.username || '').replace(/"/g, '""')}"`, 
          `"${(u.email || '').replace(/"/g, '""')}"`, 
          u.role, 
          `"${(u.club || '').replace(/"/g, '""')}"`, 
          `"${(u.sabuk || '-').replace(/"/g, '""')}"`, 
          u.gender || '-', 
          `"${(u.placeOfBirth || '-').replace(/"/g, '""')}"`, 
          u.dateOfBirth || '-', 
          `"${(u.regNo || '-').replace(/"/g, '""')}"`, 
          `"${(u.license || '-').replace(/"/g, '""')}"`, 
          `"${u.status}"`, 
          `"${u.suspendedUntil || '-'}"`
        ]);

        const csvContent = "\uFEFF" + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "Data_Pengguna_TIMura.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        triggerToast("Data pengguna berhasil diunduh!");
      };

      const handleToggleFeature = (roleKey, featureKey) => {
        const updated = {
          ...featureSettings,
          [roleKey]: {
            ...featureSettings[roleKey],
            [featureKey]: !featureSettings[roleKey]?.[featureKey]
          }
        };
        updateFeatureSettings(updated);
      };

      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          // Validasi ukuran opsional (maks 2MB agar Base64 tidak memberatkan database)
          if(file.size > 2 * 1024 * 1024) {
             triggerToast("Ukuran logo terlalu besar! Maksimal 2MB.", "error");
             return;
          }
          const reader = new FileReader();
          reader.onloadend = () => {
            const updatedSettings = {
              ...featureSettings,
              branding: {
                ...(featureSettings.branding || {}),
                logo: reader.result
              }
            };
            updateFeatureSettings(updatedSettings);
            triggerToast("Logo aplikasi berhasil diperbarui di Database!");
          };
          reader.readAsDataURL(file);
        }
      };

      const handleRemoveLogo = () => {
          if(window.confirm("Hapus logo kustom dan kembali ke logo default?")) {
              const updatedSettings = {
                ...featureSettings,
                branding: {
                  ...(featureSettings.branding || {}),
                  logo: null
                }
              };
              updateFeatureSettings(updatedSettings);
              triggerToast("Logo aplikasi dikembalikan ke default!");
          }
      };

      const renderFormInputs = (isEditMode = false) => {
        return (
          <div className="space-y-3">
            <div className="grid grid-cols-2 gap-2 bg-white p-2 rounded-xl border">
              <div><label className="block text-[9px] font-bold text-gray-700 uppercase">Username</label><input type="text" value={username} onChange={e => setUsername(e.target.value)} className="w-full text-xs p-1.5 border-b focus:outline-none" required /></div>
              <div><label className="block text-[9px] font-bold text-gray-700 uppercase">Password</label><input type="text" value={password} onChange={e => setPassword(e.target.value)} className="w-full text-xs p-1.5 border-b focus:outline-none" required /></div>
            </div>
            <div><label className="block text-[10px] font-bold text-gray-700 mb-1">Nama Lengkap</label><input type="text" placeholder="Nama Lengkap" value={name} onChange={e => setName(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl" required /></div>
            <div><label className="block text-[10px] font-bold text-gray-700 mb-1">Email</label><input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl" required /></div>
            
            <div className="grid grid-cols-2 gap-2">
              <div><label className="block text-[10px] font-bold text-gray-700 mb-1">No. Registrasi/Sertifikat</label><input type="text" placeholder="No. Reg (Otomatis jika kosong)" value={regNo} onChange={e => setRegNo(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl" /></div>
              <div><label className="block text-[10px] font-bold text-gray-700 mb-1">Jenis Kelamin</label><select value={gender} onChange={e => setGender(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl"><option value="Laki-laki">Laki-laki</option><option value="Perempuan">Perempuan</option></select></div>
            </div>
            
            <div className="grid grid-cols-2 gap-2">
              <div><label className="block text-[10px] font-bold text-gray-700 mb-1">Tempat Lahir</label><input type="text" placeholder="Tempat Lahir" value={placeOfBirth} onChange={e => setPlaceOfBirth(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl" required /></div>
              <div><label className="block text-[10px] font-bold text-gray-700 mb-1">Tanggal Lahir</label><input type="date" value={dateOfBirth} onChange={e => setDateOfBirth(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl" required /></div>
            </div>

            <div className="grid grid-cols-2 gap-2">
              <div>
                <label className="block text-[10px] font-bold text-gray-700 mb-1">Status Peran Akun</label>
                <select value={role} onChange={e => {setRole(e.target.value); if(e.target.value==='super_admin') setClub('Pusat Mura');}} className="w-full text-xs p-2.5 border rounded-xl bg-yellow-50 border-yellow-300 font-extrabold text-yellow-950">
                  <option value="atlet">Atlet</option>
                  <option value="pelatih">Pelatih</option>
                  {user.role === 'super_admin' && <option value="pengurus_club">Pengurus Club</option>}
                  {user.role === 'super_admin' && <option value="super_admin">Super Admin</option>}
                </select>
              </div>
              <div>
                <label className="block text-[10px] font-bold text-gray-700 mb-1">Unit Latihan / Club</label>
                <select 
                  value={user.role === 'super_admin' ? club : user.club} 
                  onChange={e => setClub(e.target.value)} 
                  className="w-full text-xs p-2.5 border rounded-xl disabled:bg-gray-100 disabled:text-gray-500"
                  disabled={user.role !== 'super_admin'}
                >
                  {user.role === 'super_admin' ? clubs.map(c => <option key={c} value={c}>{c}</option>) : <option value={user.club}>{user.club}</option>}
                </select>
              </div>
            </div>

            {role === 'pelatih' && (
              <div className="animate-fade-in">
                <label className="block text-[10px] font-bold text-red-700 mb-1">Kualifikasi / Lisensi Pelatih</label>
                <input type="text" placeholder="Contoh: Nasional Pratama / Daerah Sumsel" value={license} onChange={e => setLicense(e.target.value)} className="w-full text-xs p-2.5 border border-red-300 bg-red-50 rounded-xl font-bold text-red-950" required />
              </div>
            )}

            {isSabukVisible && (
              <div>
                <label className="block text-[10px] font-bold text-gray-700 mb-1">Tingkatan Sabuk</label>
                <select value={sabuk} onChange={e => setSabuk(e.target.value)} className="w-full text-xs p-2.5 border rounded-xl">
                  {beltSequence.map(b => <option key={b} value={b}>{b}</option>)}
                </select>
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="space-y-4">
          <div className="flex items-center gap-2 border-b pb-2"><Icon name="Users" className="w-5 h-5 text-red-600" /><h2 className="text-lg font-black text-gray-800">Manajemen Akun</h2></div>
          
          <div className="flex bg-gray-200 p-1 rounded-xl">
            <button onClick={() => setManagerTab('pengguna')} className={`flex-1 py-1.5 text-xs rounded-lg font-bold transition-all ${managerTab === 'pengguna' ? 'bg-white text-red-700 shadow-sm' : 'text-gray-500'}`}>Pengguna</button>
            {user.role === 'super_admin' && (
              <>
                <button onClick={() => setManagerTab('club')} className={`flex-1 py-1.5 text-xs rounded-lg font-bold transition-all ${managerTab === 'club' ? 'bg-white text-red-700 shadow-sm' : 'text-gray-500'}`}>Dojang</button>
                <button onClick={() => setManagerTab('sistem')} className={`flex-1 py-1.5 text-xs rounded-lg font-bold transition-all ${managerTab === 'sistem' ? 'bg-white text-red-700 shadow-sm' : 'text-gray-500'}`}>Sistem</button>
              </>
            )}
          </div>

          {managerTab === 'pengguna' && (<div className="space-y-4 animate-fade-in">
            
            {!showAddAccount && !editingUserId && (
              <div className="flex gap-2">
                <button onClick={() => { handleCancelEdit(); setShowAddAccount(true); }} className="flex-1 bg-red-600 text-white py-2.5 rounded-xl font-bold text-xs shadow-sm flex justify-center items-center"><Icon name="UserPlus" className="w-4 h-4 inline mr-1 text-white"/> Baru</button>
                <button onClick={handleDownloadCSV} className="flex-1 bg-blue-600 text-white py-2.5 rounded-xl font-bold text-xs shadow-sm flex justify-center items-center gap-1"><Icon name="Download" className="w-4 h-4 text-white"/> Unduh CSV</button>
                <label className="flex-1 bg-emerald-600 hover:bg-emerald-700 cursor-pointer text-white py-2.5 rounded-xl font-bold text-xs shadow-sm flex justify-center items-center gap-1 transition">
                   <Icon name="Upload" className="w-4 h-4 text-white"/> Impor CSV
                   <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                </label>
              </div>
            )}
            
            {/* FORMULIR BUAT AKUN BARU (TETAP DI ATAS JIKA BARU) */}
            {showAddAccount && !editingUserId && (
              <form onSubmit={handleAddAccountSubmit} className="bg-red-50 p-4 rounded-3xl border border-red-100 space-y-3">
                <div className="flex justify-between items-center pb-2 border-b">
                  <span className="font-bold text-xs text-red-950">Akun Baru</span>
                  <button type="button" onClick={handleCancelEdit}><Icon name="XCircle" className="w-5 h-5 text-gray-400" /></button>
                </div>
                {renderFormInputs(false)}
                <button type="submit" className="w-full bg-red-700 hover:bg-red-800 text-white py-2.5 rounded-xl font-bold text-xs shadow mt-2 transition-all">
                  Registrasi Akun Baru
                </button>
              </form>
            )}

            {/* STATISTIK SABUK KESELURUHAN (WRAP / TAMPIL SEMUA LENGKAP) */}
            {activeBelts.length > 0 && !editingUserId && !showAddAccount && (
              <div className="mb-3 animate-fade-in bg-white p-3 rounded-2xl border border-gray-100 shadow-sm">
                 <div className="flex items-center gap-1.5 mb-2.5">
                   <Icon name="PieChart" className="w-4 h-4 text-red-600" />
                   <span className="text-[10px] font-extrabold text-gray-800 uppercase tracking-wider">Statistik Sabuk Keseluruhan</span>
                 </div>
                 <div className="flex flex-wrap gap-2">
                    {activeBelts.map(belt => (
                       <div key={belt} className="bg-gray-50 border border-gray-200 rounded-lg px-2 py-1.5 flex items-center gap-2 hover:bg-gray-100 transition cursor-default shadow-sm">
                          <div className={`w-2.5 h-2.5 rounded-full shrink-0 ${getBeltColorDot(belt)}`}></div>
                          <span className="text-[10px] font-bold text-gray-700 leading-none">{belt.split(' (')[0].replace('Sabuk ', '')}</span>
                          <span className="text-[10px] font-black text-white bg-red-600 px-1.5 py-0.5 rounded leading-none flex items-center justify-center">{beltStats[belt]}</span>
                       </div>
                    ))}
                 </div>
              </div>
            )}

            <div className="relative mb-2">
              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Icon name="Search" className="w-4 h-4 text-gray-400" /></div>
              <input type="text" placeholder="Cari nama atau No. Reg..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full text-xs pl-9 p-2.5 bg-white border border-gray-200 rounded-xl focus:ring-1 focus:ring-red-500 transition" />
            </div>

            {/* LIST PENGGUNA */}
            <div className="space-y-3">
              {visibleUsers.length === 0 && <p className="text-center text-xs text-gray-400 py-4 italic">Pengguna tidak ditemukan.</p>}
              {visibleUsers.map(u => (
                <div key={u.id} className="bg-white p-3.5 rounded-3xl border shadow-sm space-y-3">
                  <div className="flex justify-between items-center hover:bg-gray-50/50">
                    <div className="flex items-center gap-3 flex-1 min-w-0 pr-2">
                      {u.avatar ? (
                        <img src={u.avatar} alt="Profile" className="w-8 h-8 rounded-full object-cover shrink-0 border border-gray-200" />
                      ) : (
                        <Icon name="UserCircle" className="w-8 h-8 text-gray-300 shrink-0" />
                      )}
                      <div className="min-w-0">
                        <div className="font-extrabold text-sm text-gray-800 truncate">{u.name}</div>
                        <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                          <span className="bg-red-50 text-red-800 px-1.5 py-0.5 rounded font-bold text-[8px] uppercase">{u.role.replace('_', ' ')}</span>
                          <span className="text-[9px] text-gray-500 font-bold">{u.club}</span>
                          {(u.role === 'atlet' || u.role === 'pelatih') && (
                            <>
                              <span className="text-gray-300">|</span>
                              <VisualBelt beltName={u.sabuk} />
                            </>
                          )}
                          {u.status === 'Nonaktif' && <span className="bg-red-500 text-white px-1.5 py-0.5 rounded font-bold text-[8px]">SUSPENDED</span>}
                        </div>
                      </div>
                    </div>
                    <div className="flex gap-1.5">
                      <button onClick={() => setKtaUser(u)} className="p-2 bg-amber-50 text-amber-600 rounded-2xl hover:bg-amber-100" title="Cetak KTA"><Icon name="CreditCard" className="w-4 h-4" /></button>
                      <button onClick={() => handleStartEdit(u)} className="p-2 bg-blue-50 text-blue-600 rounded-2xl hover:bg-blue-100" title="Edit Akun"><Icon name="Edit" className="w-4 h-4" /></button>
                      {u.id !== user.id && <button onClick={() => handleDelete(u.id)} className="p-2 bg-red-50 text-red-600 rounded-2xl hover:bg-red-100" title="Hapus Akun"><Icon name="Trash2" className="w-4 h-4" /></button>}
                    </div>
                  </div>

                  {/* FORMULIR EDIT LANGSUNG MUNCUL DI BAWAH NAMA (INLINE) */}
                  {editingUserId === u.id && (
                    <form onSubmit={handleAddAccountSubmit} className="bg-amber-50/70 p-4 rounded-2xl border border-amber-200 space-y-3 animate-fade-in mt-3">
                      <div className="flex justify-between items-center pb-2 border-b border-amber-200">
                        <span className="font-bold text-xs text-amber-950">Ubah Identitas: {u.name}</span>
                        <button type="button" onClick={handleCancelEdit}><Icon name="XCircle" className="w-5 h-5 text-gray-400" /></button>
                      </div>
                      {renderFormInputs(true)}
                      <div className="flex gap-2 mt-2">
                        <button type="submit" className="flex-1 bg-red-700 hover:bg-red-800 text-white py-2 rounded-xl font-bold text-xs shadow transition-all">
                          Simpan Perubahan
                        </button>
                        <button type="button" onClick={handleCancelEdit} className="bg-gray-400 hover:bg-gray-500 text-white py-2 px-4 rounded-xl font-bold text-xs shadow transition-all">
                          Batal
                        </button>
                      </div>
                    </form>
                  )}
                </div>
              ))}
            </div>
            
            {/* Menampilkan Modul KTA Admin apabila State aktif */}
            {ktaUser && <KtaModal user={ktaUser} onClose={() => setKtaUser(null)} triggerToast={triggerToast} featureSettings={featureSettings} />}
            
          </div>)}

          {managerTab === 'club' && (
            <div className="space-y-4 animate-fade-in">
              <form onSubmit={handleAddClub} className="bg-red-50 p-4 rounded-3xl border border-red-100 flex gap-2">
                <input type="text" placeholder="Nama Club Baru" value={newClubName} onChange={e => setNewClubName(e.target.value)} className="flex-1 text-xs p-2.5 border rounded-xl" required />
                <button type="submit" className="bg-red-700 text-white px-4 py-2 text-xs font-bold rounded-xl shadow">Tambah (DB)</button>
              </form>
              <div className="space-y-2">
                {clubs.map((c, index) => (
                  <div key={index} className="bg-white p-3 rounded-2xl border shadow-sm transition">
                    {editingClubIndex === index ? (
                      <form onSubmit={(e) => handleEditClubSave(e, index)} className="flex gap-2">
                        <input type="text" value={editClubNameValue} onChange={e => setEditClubNameValue(e.target.value)} className="flex-1 text-xs p-2 border rounded-xl" required />
                        <button type="submit" className="bg-green-600 text-white px-3 py-1.5 text-[10px] font-bold rounded-lg shadow">Simpan</button>
                        <button type="button" onClick={() => setEditingClubIndex(null)} className="bg-gray-400 text-white px-3 py-1.5 text-[10px] font-bold rounded-lg shadow">Batal</button>
                      </form>
                    ) : (
                      <div className="flex justify-between items-center">
                        <span className="font-bold text-gray-800 text-sm">{c}</span>
                        <div className="flex gap-2">
                          <button onClick={() => handleEditClubStart(index, c)} className="text-blue-500 hover:text-blue-700"><Icon name="Edit" className="w-4 h-4" /></button>
                          <button onClick={() => handleDeleteClub(index)} className="text-red-500 hover:text-red-700"><Icon name="Trash2" className="w-4 h-4" /></button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          {managerTab === 'sistem' && (
            <div className="space-y-4 animate-fade-in">
              <div className="bg-white p-4 rounded-3xl border shadow-sm space-y-3">
                <span className="font-extrabold text-xs text-red-800 uppercase block border-b pb-1">Branding & Identitas Visual</span>
                <p className="text-[10px] text-gray-500 mb-2">Ubah logo aplikasi yang akan tampil di halaman Login dan Header. (Ukuran maksimal: 2MB)</p>
                <div className="flex items-center gap-4 bg-gray-50 p-3 rounded-2xl border border-gray-100">
                   <div className="w-16 h-16 rounded-xl bg-white border-2 border-dashed border-gray-300 flex items-center justify-center overflow-hidden shrink-0 shadow-sm">
                      {featureSettings?.branding?.logo ? (
                         <img src={featureSettings.branding.logo} alt="Logo" className="w-full h-full object-contain p-1" />
                      ) : (
                         <Icon name="Image" className="w-6 h-6 text-gray-300" />
                      )}
                   </div>
                   <div className="flex-1">
                      <div className="flex flex-wrap gap-2">
                          <label className="bg-blue-600 hover:bg-blue-700 cursor-pointer text-white px-3 py-2 rounded-xl text-[10px] font-bold shadow-sm flex items-center gap-1.5 transition">
                             <Icon name="UploadCloud" className="w-3.5 h-3.5 text-white" /> Unggah Logo
                             <input type="file" accept="image/*" className="hidden" onChange={handleLogoUpload} />
                          </label>
                          {featureSettings?.branding?.logo && (
                             <button onClick={handleRemoveLogo} className="bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 rounded-xl text-[10px] font-bold shadow-sm flex items-center gap-1.5 border border-red-100 transition">
                                <Icon name="Trash2" className="w-3.5 h-3.5" /> Hapus
                             </button>
                          )}
                      </div>
                      <p className="text-[8px] text-gray-400 mt-2 font-bold uppercase tracking-wide">Direkomendasikan: Rasio 1:1, Latar Transparan (PNG).</p>
                   </div>
                </div>
              </div>

              <div className="bg-white p-4 rounded-3xl border shadow-sm space-y-3">
                <span className="font-extrabold text-xs text-red-800 uppercase block border-b pb-1">Pengaturan Izin Fitur</span>
                <p className="text-[10px] text-gray-500 mb-2">Pilih fitur apa saja yang dapat diakses oleh masing-masing tingkatan akun. Super Admin otomatis memiliki akses penuh.</p>
                {['pengurus_club', 'pelatih', 'atlet'].map(roleKey => (
                  <div key={roleKey} className="border border-gray-100 rounded-xl overflow-hidden mb-3">
                    <div className="bg-gray-100 p-2 font-bold text-xs uppercase text-gray-700">{roleKey.replace('_', ' ')}</div>
                    <div className="p-2 grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
                      <div className="flex justify-between items-center p-2 bg-gray-50 rounded-xl border">
                        <span>Modul Tagihan & Kas</span>
                        <button type="button" onClick={() => handleToggleFeature(roleKey, 'spp')} className={`w-10 h-6 rounded-full p-1 transition-all duration-300 ${featureSettings[roleKey]?.spp !== false ? 'bg-red-600 text-right' : 'bg-gray-300 text-left'}`}>
                          <div className="w-4 h-4 bg-white rounded-full shadow-md inline-block"></div>
                        </button>
                      </div>
                      <div className="flex justify-between items-center p-2 bg-gray-50 rounded-xl border">
                        <span>Modul Pelanggaran / Sanksi</span>
                        <button type="button" onClick={() => handleToggleFeature(roleKey, 'sanksi')} className={`w-10 h-6 rounded-full p-1 transition-all duration-300 ${featureSettings[roleKey]?.sanksi !== false ? 'bg-red-600 text-right' : 'bg-gray-300 text-left'}`}>
                          <div className="w-4 h-4 bg-white rounded-full shadow-md inline-block"></div>
                        </button>
                      </div>
                      <div className="flex justify-between items-center p-2 bg-gray-50 rounded-xl border">
                        <span>Modul UKT & Raport</span>
                        <button type="button" onClick={() => handleToggleFeature(roleKey, 'ukt')} className={`w-10 h-6 rounded-full p-1 transition-all duration-300 ${featureSettings[roleKey]?.ukt !== false ? 'bg-red-600 text-right' : 'bg-gray-300 text-left'}`}>
                          <div className="w-4 h-4 bg-white rounded-full shadow-md inline-block"></div>
                        </button>
                      </div>
                      <div className="flex justify-between items-center p-2 bg-gray-50 rounded-xl border">
                        <span>Modul Event</span>
                        <button type="button" onClick={() => handleToggleFeature(roleKey, 'kejuaraan')} className={`w-10 h-6 rounded-full p-1 transition-all duration-300 ${featureSettings[roleKey]?.kejuaraan !== false ? 'bg-red-600 text-right' : 'bg-gray-300 text-left'}`}>
                          <div className="w-4 h-4 bg-white rounded-full shadow-md inline-block"></div>
                        </button>
                      </div>
                      <div className="flex justify-between items-center p-2 bg-gray-50 rounded-xl border">
                        <span>Modul Poin</span>
                        <button type="button" onClick={() => handleToggleFeature(roleKey, 'poin')} className={`w-10 h-6 rounded-full p-1 transition-all duration-300 ${featureSettings[roleKey]?.poin !== false ? 'bg-red-600 text-right' : 'bg-gray-300 text-left'}`}>
                          <div className="w-4 h-4 bg-white rounded-full shadow-md inline-block"></div>
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // Render App via MainAppContainer untuk memfasilitasi Auth & Koneksi Cloud DB
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainAppContainer />);
  </script>
  <script>
    // Bootstrap: manually transform & load the babel module script if Babel didn't auto-run it
    (function() {
      function tryBootstrap() {
        if (typeof Babel === 'undefined') { setTimeout(tryBootstrap, 100); return; }
        var babelScript = document.querySelector('script[type="text/babel"][data-type="module"]');
        if (!babelScript) return;
        // Give React a tick to render if Babel already handled it
        setTimeout(function() {
          if (document.getElementById('root').children.length > 0) return; // Already rendered
          try {
            var transformed = Babel.transform(babelScript.textContent, {
              presets: [['react', { runtime: 'classic' }], 'env'],
              sourceType: 'module'
            }).code;
            var blob = new Blob([transformed], { type: 'application/javascript' });
            var url = URL.createObjectURL(blob);
            import(url).catch(function(e) {
              console.error('Bootstrap module load error:', e);
            });
          } catch (e) {
            console.error('Bootstrap transform error:', e);
          }
        }, 800);
      }
      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        tryBootstrap();
      } else {
        window.addEventListener('DOMContentLoaded', tryBootstrap);
      }
    })();
  </script>
</body>
</html>
